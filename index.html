<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>エミライズ 顧客ボード</title>
<style>
  :root { --accent:#2f6f5f; --bg:#f4f6f5; --card:#fff; --line:#e3e8e6; --text:#1f2d2a; --sub:#6b7c77; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); }
  header[hidden] { display:none; }
  header { position:sticky; top:0; z-index:10; background:var(--accent); color:#fff; padding:10px 14px; display:flex; align-items:center; gap:10px; }
  header .brand { font-weight:700; font-size:15px; margin-right:auto; }
  header button, header a { background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:8px; padding:7px 12px; font-size:13px; text-decoration:none; cursor:pointer; }
  main { max-width:none; margin:0 auto; padding:14px 18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  h2 { font-size:16px; margin:6px 2px 10px; }
  h3 { font-size:13px; color:var(--sub); margin:14px 2px 6px; text-transform:none; }
  .daynav { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .daynav button { border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-size:14px; cursor:pointer; }
  .daynav input { border:1px solid var(--line); border-radius:10px; padding:8px; font-size:14px; flex:1; }
  .staff-head { display:flex; align-items:center; gap:8px; margin:16px 2px 6px; font-weight:700; font-size:14px; }
  .staff-head .cnt { color:var(--sub); font-weight:400; font-size:12px; }
  .row { display:flex; align-items:center; gap:10px; padding:12px 14px; background:#fff; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; text-decoration:none; color:inherit; }
  .row:active { background:#f0f4f2; }
  .time { font-weight:700; font-variant-numeric:tabular-nums; min-width:46px; }
  .cust { font-weight:600; flex:1; }
  .menu { color:var(--sub); font-size:12px; max-width:34%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge { color:#fff; font-size:11px; border-radius:999px; padding:3px 8px; white-space:nowrap; }
  .empty { color:var(--sub); text-align:center; padding:30px 0; }
  .kv { display:grid; grid-template-columns:88px 1fr; gap:6px 10px; font-size:14px; }
  .kv dt { color:var(--sub); } .kv dd { margin:0; word-break:break-all; }
  .pill { display:inline-block; background:#eef3f1; border-radius:999px; padding:4px 10px; font-size:12px; margin:2px 4px 2px 0; }
  .pill.warn { background:#fdecec; color:#b3261e; }
  .hist { display:flex; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:13px; align-items:baseline; }
  .hist:last-child { border-bottom:none; }
  .hist .d { min-width:104px; font-variant-numeric:tabular-nums; }
  .hist .future { color:var(--accent); font-weight:700; }
  .note { border-bottom:1px solid var(--line); padding:10px 2px; }
  .note:last-child { border-bottom:none; }
  .note .meta { font-size:11px; color:var(--sub); margin-bottom:3px; }
  textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:14px; min-height:74px; font-family:inherit; }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:10px 18px; font-size:14px; cursor:pointer; }
  .btn[disabled] { opacity:.5; }
  .login-wrap { max-width:360px; margin:12vh auto 0; padding:0 16px; }
  .login-wrap input { width:100%; border:1px solid var(--line); border-radius:10px; padding:12px; font-size:15px; margin-bottom:10px; }
  .login-wrap .btn { width:100%; padding:12px; }
  .err { color:#b3261e; font-size:13px; margin:8px 0; }
  .searchbar { display:flex; gap:8px; margin-bottom:12px; }
  .searchbar input { flex:1; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:15px; }
  .back { display:inline-block; margin-bottom:10px; color:var(--accent); text-decoration:none; font-size:14px; }
  .qa { font-size:13px; padding:6px 2px; border-bottom:1px dashed var(--line); }
  .qa:last-child { border-bottom:none; }
  .qa .q { color:var(--sub); }
  /* ── タイムライン（日/週/月） ── */
  .tabs { display:flex; gap:6px; margin-bottom:10px; }
  .tabs a { padding:7px 14px; border:1px solid var(--line); border-radius:999px; background:#fff; text-decoration:none; color:inherit; font-size:13px; }
  .tabs a.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chips a { padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:#fff; text-decoration:none; color:inherit; font-size:12px; }
  .chips a.on { background:#1f2d2a; color:#fff; border-color:#1f2d2a; }
  .selbar { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  .selbar select, .selbar button, .selbar input { border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px; background:#fff; }
  .tlwrap { overflow-x:auto; background:#fff; border:1px solid var(--line); border-radius:12px; padding:4px 0 8px; }
  .tl { min-width:1000px; position:relative; }
  .tlhead { display:flex; height:22px; }
  .tlrow { display:flex; align-items:stretch; border-top:1px solid var(--line); }
  .tlname { flex:0 0 86px; position:sticky; left:0; background:#fff; z-index:2; font-size:12px; font-weight:700; padding:12px 6px 0; border-right:1px solid var(--line); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tltrack { position:relative; flex:1; height:42px; background-image:repeating-linear-gradient(to right, var(--line) 0 1px, transparent 1px 8%); }
  .tlhead .tltrack { height:22px; background:none; }
  .tlhour { position:absolute; top:4px; font-size:10px; color:var(--sub); padding-left:3px; }
  .tlblock { position:absolute; top:5px; height:32px; border-radius:6px; color:#fff; font-size:11px; line-height:32px; padding:0 5px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; text-decoration:none; min-width:20px; box-shadow:0 1px 2px rgba(0,0,0,.15); }
  .mgrid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .mwd { text-align:center; font-size:11px; color:var(--sub); padding:2px 0; }
  .mcell { display:block; background:#fff; border:1px solid var(--line); border-radius:8px; min-height:74px; padding:4px; font-size:10.5px; overflow:hidden; text-decoration:none; color:inherit; }
  .mcell .dnum { font-weight:700; font-size:12px; margin-bottom:2px; }
  .mcell .mi { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--accent); font-weight:600; }
  .mcell .more { color:var(--sub); }
  .mcell.today { border:2px solid var(--accent); }
  .mcell.blank { background:transparent; border:none; }
  .tlblock { z-index:1; }
  .tbblk { position:absolute; top:2px; bottom:2px; z-index:0; border-radius:4px; color:#6b6357; font-size:10px; padding:1px 4px; cursor:pointer; overflow:hidden; white-space:nowrap;
    background:repeating-linear-gradient(45deg, #d8d2c6 0 6px, #cdc6b8 6px 12px); }
  .tlname.sat { color:#3a6ea5; }
  .tlname.sun { color:#b3261e; }
  .tbform { display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:13px; }
  .tbform select, .tbform input { border:1px solid var(--line); border-radius:8px; padding:7px; font-size:13px; background:#fff; }
  .rowwrap { display:flex; gap:6px; align-items:stretch; margin-bottom:8px; }
  .ck { width:42px; border-radius:12px; border:1px solid var(--line); background:#fff; color:#c5cfcb; font-size:17px; cursor:pointer; flex:0 0 42px; }
  .ck.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .mic { border:1px solid var(--line); background:#fff; border-radius:10px; padding:9px 14px; font-size:14px; cursor:pointer; }
  .mic.rec { background:#b3261e; color:#fff; border-color:#b3261e; }
  .rep { width:100%; border-collapse:collapse; font-size:13px; background:#fff; }
  .rep th, .rep td { border:1px solid var(--line); padding:8px 6px; text-align:right; white-space:nowrap; }
  .rep th:first-child, .rep td:first-child { text-align:left; position:sticky; left:0; background:#fff; }
  .rep thead th { background:#eef3f1; text-align:center; }
  .rep .tot td { font-weight:700; background:#fafcfb; }
  .bar { height:6px; background:#e8eeec; border-radius:4px; overflow:hidden; margin-top:3px; }
  .bar span { display:block; height:100%; background:var(--accent); }
</style>
</head>
<body>
<header id="topbar" hidden>
  <span class="brand">エミライズ 顧客ボード</span>
  <a href="#/">予約</a>
  <a href="#/tl">タイムライン</a>
  <a href="#/report">日報</a>
  <a href="#/search">検索</a>
  <button id="logoutBtn">ログアウト</button>
</header>
<main id="app"><div class="empty">読み込み中…</div></main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://bbhrcvhvzknsephftsbz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiaHJjdmh2emtuc2VwaGZ0c2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjk5NjEsImV4cCI6MjA5ODgwNTk2MX0.S40aeplTPHGQPdTsqi5krP7-UopEBLDsifx_8m4cD1I';
const sb = createClient(SB_URL, SB_KEY);

const app = document.getElementById('app');
const topbar = document.getElementById('topbar');
document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.hash = ''; render(); };

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
const TZ = 'Asia/Tokyo';
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', timeZone:TZ });
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ja-JP', { year:'numeric', month:'numeric', day:'numeric', weekday:'short', timeZone:TZ });
}
function jstToday() {
  const p = new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(new Date());
  return p; // YYYY-MM-DD
}
function addDays(dstr, n) {
  const d = new Date(dstr + 'T00:00:00+09:00');
  d.setUTCDate(d.getUTCDate() + n);
  return new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(d);
}
const STORE_COLORS = ['#2f6f5f', '#5a67a5', '#b0743a', '#8a5aa5', '#3a7fb0'];
function storeColor(tag) {
  let h = 0; const s = String(tag || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return STORE_COLORS[h % STORE_COLORS.length];
}
function qaItems(arr) {
  // profile_fields / questionnaires から {question, answer} を汎用に取り出す
  const out = [];
  function walk(x) {
    if (!x) return;
    if (Array.isArray(x)) { x.forEach(walk); return; }
    if (typeof x === 'object') {
      if (x.question) {
        out.push({ q: x.question, a: (x.answer != null ? x.answer : (x.answers || '')) });
      }
      Object.keys(x).forEach(function(k) { if (k !== 'question' && k !== 'answer') walk(x[k]); });
    }
  }
  walk(arr);
  return out;
}

// ── ログイン ──────────────────────────────
function renderLogin(msg) {
  topbar.hidden = true;
  app.innerHTML = '<div class="login-wrap"><div class="card">'
    + '<h2>スタッフログイン</h2>'
    + (msg ? '<div class="err">' + esc(msg) + '</div>' : '')
    + '<input id="em" type="email" placeholder="メールアドレス" autocomplete="username">'
    + '<input id="pw" type="password" placeholder="パスワード" autocomplete="current-password">'
    + '<button class="btn" id="loginBtn">ログイン</button>'
    + '</div></div>';
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
}
async function doLogin() {
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email: em, password: pw });
  btn.disabled = false;
  if (error) { renderLogin('ログインできませんでした。メールアドレスとパスワードをご確認ください。'); return; }
  location.hash = '#/';
  render();
}

// ── 日別予約一覧 ──────────────────────────
async function renderDay(dateStr) {
  const d = dateStr || jstToday();
  app.innerHTML = '<div class="empty">読み込み中…</div>';
  const from = d + 'T00:00:00+09:00';
  const to = addDays(d, 1) + 'T00:00:00+09:00';
  const { data, error } = await sb.from('crm_reservations').select('*')
    .gte('booking_start', from).lt('booking_start', to)
    .eq('status', 'accepted').order('booking_start');
  if (error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(error.message) + '</div>'; return; }
  const checks = await fetchChecks(d, addDays(d, 1));

  let html = '<div class="daynav">'
    + '<button id="prevD">←</button>'
    + '<input type="date" id="dayPick" value="' + d + '">'
    + '<button id="nextD">→</button>'
    + '<button id="todayD">今日</button>'
    + '</div>';
  html += '<h2>' + fmtDate(from) + ' の予約 ' + (data.length ? '（' + data.length + '件）' : '') + '</h2>';

  if (!data.length) {
    html += '<div class="empty">この日の予約はありません</div>';
  } else {
    const groups = {};
    data.forEach(function(r) {
      const st = (r.staff_names && r.staff_names[0]) || '担当未設定';
      (groups[st] = groups[st] || []).push(r);
    });
    Object.keys(groups).sort().forEach(function(st) {
      const rows = groups[st];
      html += '<div class="staff-head">' + esc(st) + ' <span class="cnt">' + rows.length + '件</span></div>';
      rows.forEach(function(r) {
        const ck = checks[r.reservation_id];
        html += '<div class="rowwrap">'
          + '<button class="ck' + (ck ? ' on' : '') + '" data-rid="' + r.reservation_id + '" title="' + (ck ? esc((ck.checked_by_name || '') + ' が確認済み') : '見た印を付ける') + '">✓</button>'
          + '<a class="row" style="flex:1;margin-bottom:0" href="#/c/' + encodeURIComponent(r.merchant_id) + '/' + r.customer_id + '">'
          + '<span class="time">' + fmtTime(r.booking_start) + '</span>'
          + '<span class="cust">' + esc(r.customer_name || '（名前なし）') + '</span>'
          + '<span class="menu">' + esc(r.menu || '') + '</span>'
          + '<span class="badge" style="background:' + storeColor(r.store_tag) + '">' + esc(r.store_tag || '') + '</span>'
          + '</a></div>';
      });
    });
  }
  app.innerHTML = html;
  document.getElementById('prevD').onclick = function() { location.hash = '#/?date=' + addDays(d, -1); };
  document.getElementById('nextD').onclick = function() { location.hash = '#/?date=' + addDays(d, 1); };
  document.getElementById('todayD').onclick = function() { location.hash = '#/'; };
  document.getElementById('dayPick').onchange = function(e) { location.hash = '#/?date=' + e.target.value; };
  Array.prototype.forEach.call(document.querySelectorAll('.ck'), function(btn) {
    btn.onclick = async function() {
      const rid = btn.getAttribute('data-rid');
      const r = data.find(function(x) { return String(x.reservation_id) === rid; });
      if (!r) return;
      btn.disabled = true;
      await toggleCheck(r, !!checks[r.reservation_id]);
      renderDay(dateStr);
    };
  });
}

// ── 顧客プロフィール ──────────────────────
async function renderCustomer(mid, cid) {
  app.innerHTML = '<div class="empty">読み込み中…</div>';
  const nowIso = new Date().toISOString();
  const [cRes, histRes, karteRes] = await Promise.all([
    sb.from('crm_customers').select('*').eq('merchant_id', mid).eq('customer_id', cid).maybeSingle(),
    sb.from('crm_reservations').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('booking_start', { ascending: false }).limit(100),
    sb.from('crm_karte_notes').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('created_at', { ascending: false }).limit(50),
  ]);
  const c = cRes.data;
  const hist = histRes.data || [];
  const karte = karteRes.data || [];
  const name = (c && c.name) || (hist[0] && hist[0].customer_name) || '（不明）';

  let html = '<a class="back" href="#/">← 予約一覧へ</a>';

  // 基本情報
  html += '<div class="card"><h2>' + esc(name) + (c && c.kana ? ' <small style="color:var(--sub);font-weight:400">' + esc(c.kana) + '</small>' : '') + '</h2>';
  html += '<dl class="kv">';
  if (c) {
    if (c.merchant_name) html += '<dt>店舗</dt><dd>' + esc(c.merchant_name) + '</dd>';
    if (c.phone) html += '<dt>電話</dt><dd><a href="tel:' + esc(c.phone) + '">' + esc(c.phone) + '</a></dd>';
    if (c.email) html += '<dt>メール</dt><dd>' + esc(c.email) + '</dd>';
    if (c.membership_number) html += '<dt>会員番号</dt><dd>' + esc(c.membership_number) + '</dd>';
    if (c.birthday) html += '<dt>生年月日</dt><dd>' + esc(c.birthday) + '</dd>';
    if (c.channel) html += '<dt>集客経路</dt><dd>' + esc(c.channel) + '</dd>';
    if (c.first_reserved_at) html += '<dt>初回予約</dt><dd>' + fmtDate(c.first_reserved_at) + '</dd>';
  }
  const pastVisits = hist.filter(function(r){ return r.booking_start < nowIso && r.status === 'accepted'; });
  const totalSpent = hist.reduce(function(a, r){ return a + (r.booking_start < nowIso ? (Number(r.price) || 0) : 0); }, 0);
  const nextVisit = hist.filter(function(r){ return r.booking_start >= nowIso; }).length;
  html += '<dt>来店実績</dt><dd>' + pastVisits.length + '回' + (nextVisit ? '（次回で' + (pastVisits.length + 1) + '回目）' : '') + '</dd>';
  html += '<dt>累計利用額</dt><dd>' + totalSpent.toLocaleString('ja-JP') + '円 <small style="color:var(--sub)">※レッスン料ベース・月謝/回数券払いは0円計上</small></dd>';
  html += '</dl>';

  // 月謝・回数券
  const subs = (c && c.subscriptions) || [];
  const tickets = (c && c.ticket_books) || [];
  if (subs.length || tickets.length) {
    html += '<h3>月謝・回数券</h3><div>';
    subs.forEach(function(s) {
      const st = s.contract_status === 'active' ? '継続中' : '停止中';
      html += '<span class="pill' + (s.contract_status === 'active' ? '' : ' warn') + '">' + esc(s.product_name || '月謝') + '｜' + st + '</span>';
    });
    tickets.forEach(function(t) {
      const low = (t.remaining_tickets != null && t.remaining_tickets <= 2);
      html += '<span class="pill' + (low ? ' warn' : '') + '">' + esc(t.product_name || '回数券')
        + '｜残' + (t.remaining_tickets != null ? t.remaining_tickets : '?') + '回'
        + (t.expires_at ? '（' + fmtDate(t.expires_at) + 'まで）' : '') + '</span>';
    });
    html += '</div>';
  }

  // STORESメモ
  if (c && c.memo) {
    html += '<h3>STORES顧客メモ</h3><div style="white-space:pre-wrap;font-size:14px">' + esc(c.memo) + '</div>';
  }

  // アンケート・プロフィール項目
  const qa = qaItems(c && c.profile_fields).concat(qaItems(hist.slice(0, 3).map(function(r){ return r.questionnaires; })));
  if (qa.length) {
    html += '<h3>アンケート・プロフィール</h3>';
    qa.slice(0, 12).forEach(function(x) {
      html += '<div class="qa"><span class="q">' + esc(x.q) + '：</span>' + esc(typeof x.a === 'object' ? JSON.stringify(x.a) : x.a) + '</div>';
    });
  }
  html += '</div>';

  // カルテ
  html += '<div class="card"><h2>カルテ（引き継ぎメモ）</h2>'
    + '<textarea id="noteText" placeholder="今日の様子・次回の注意点など（🎤で音声入力できます）"></textarea>'
    + '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">'
    + '<button class="mic" id="micBtn">🎤 音声入力</button>'
    + '<button class="btn" id="noteSave">保存</button></div>'
    + '<div id="noteList">';
  if (!karte.length) html += '<div class="empty" style="padding:14px 0">まだカルテはありません</div>';
  karte.forEach(function(n) {
    html += '<div class="note"><div class="meta">' + esc(n.author_name || '') + '・' + fmtDate(n.created_at) + ' ' + fmtTime(n.created_at) + '</div>'
      + '<div style="white-space:pre-wrap;font-size:14px">' + esc(n.note) + '</div></div>';
  });
  html += '</div></div>';

  // 予約履歴
  html += '<div class="card"><h2>予約履歴</h2>';
  if (!hist.length) html += '<div class="empty">履歴がありません</div>';
  hist.forEach(function(r) {
    const future = r.booking_start >= nowIso;
    html += '<div class="hist"><span class="d' + (future ? ' future' : '') + '">' + fmtDate(r.booking_start) + '</span>'
      + '<span>' + fmtTime(r.booking_start) + '</span>'
      + '<span style="flex:1">' + esc(r.menu || '') + '</span>'
      + '<span style="color:var(--sub)">' + esc((r.staff_names || []).join('・')) + '</span>'
      + (future ? '<span class="pill">予定</span>' : '')
      + '</div>';
  });
  html += '</div>';

  app.innerHTML = html;

  // 音声入力（対応ブラウザのみ。非対応ならボタンを隠す＝キーボードのマイクで代用可）
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('micBtn');
  if (!SR) {
    micBtn.style.display = 'none';
  } else {
    let recog = null;
    micBtn.onclick = function() {
      if (recog) { recog.stop(); return; }
      recog = new SR();
      recog.lang = 'ja-JP';
      recog.interimResults = false;
      recog.continuous = true;
      micBtn.classList.add('rec');
      micBtn.textContent = '⏹ 停止';
      recog.onresult = function(e) {
        let t = '';
        for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        const ta = document.getElementById('noteText');
        ta.value = (ta.value ? ta.value + ' ' : '') + t;
      };
      recog.onend = function() {
        recog = null;
        micBtn.classList.remove('rec');
        micBtn.textContent = '🎤 音声入力';
      };
      recog.onerror = recog.onend;
      recog.start();
    };
  }

  document.getElementById('noteSave').onclick = async function() {
    const txt = document.getElementById('noteText').value.trim();
    if (!txt) return;
    this.disabled = true;
    const { data: sess } = await sb.auth.getUser();
    const u = sess && sess.user;
    const authorName = (u && u.user_metadata && u.user_metadata.name) || (u && u.email) || '';
    const { error } = await sb.from('crm_karte_notes').insert({
      merchant_id: mid, customer_id: Number(cid), note: txt, author_name: authorName,
    });
    if (error) { alert('保存できませんでした: ' + error.message); this.disabled = false; return; }
    renderCustomer(mid, cid);
  };
}

// ── タイムライン（日/週/月・ワンモア管理画面風） ─────────
const TL_START = 540, TL_END = 1290, TL_TOTAL = TL_END - TL_START; // 9:00〜21:30
const WDAYS = ['日', '月', '火', '水', '木', '金', '土'];
function nw(s) { return String(s || '').replace(/[\s　]+/g, ''); }
function wdow(dstr) { return new Date(dstr + 'T12:00:00+09:00').getUTCDay(); }
function fmtMD(dstr) { return parseInt(dstr.slice(5, 7), 10) + '/' + parseInt(dstr.slice(8, 10), 10) + '(' + WDAYS[wdow(dstr)] + ')'; }
function weekStart(dstr) { return addDays(dstr, -((wdow(dstr) + 6) % 7)); }
function minsOf(iso) {
  const parts = new Intl.DateTimeFormat('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: TZ }).format(new Date(iso)).split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}
function tlHash(mode, kv) {
  let h = '#/tl?mode=' + mode;
  Object.keys(kv).forEach(function(k) { if (kv[k]) h += '&' + k + '=' + encodeURIComponent(kv[k]); });
  return h;
}
async function fetchRange(fromDate, toDateExcl) {
  return await sb.from('crm_reservations').select('*')
    .gte('booking_start', fromDate + 'T00:00:00+09:00')
    .lt('booking_start', toDateExcl + 'T00:00:00+09:00')
    .eq('status', 'accepted').order('booking_start').limit(2000);
}
// ── 見た印（対応済みチェック） ─────────────
async function fetchChecks(fromDate, toDateExcl) {
  const { data } = await sb.from('crm_reservation_checks').select('*')
    .gte('booking_start', fromDate + 'T00:00:00+09:00')
    .lt('booking_start', toDateExcl + 'T00:00:00+09:00').limit(2000);
  const map = {};
  (data || []).forEach(function(c) { map[c.reservation_id] = c; });
  return map;
}
async function toggleCheck(r, isChecked) {
  if (isChecked) {
    await sb.from('crm_reservation_checks').delete().eq('reservation_id', r.reservation_id);
  } else {
    const { data: sess } = await sb.auth.getUser();
    const u = sess && sess.user;
    const nm = (u && u.user_metadata && u.user_metadata.name) || (u && u.email) || '';
    await sb.from('crm_reservation_checks').insert({
      reservation_id: r.reservation_id, booking_start: r.booking_start, checked_by_name: nm,
    });
  }
}

// ── 休み・ブロック枠（ボード側管理。STORES APIはシフト/ブロックを提供しない） ──
async function fetchBlocks(fromDate, toDateExcl) {
  const { data } = await sb.from('crm_time_blocks').select('*')
    .gte('date', fromDate).lt('date', toDateExcl).limit(2000);
  return data || [];
}
function hm2m(s) { const p = String(s || '').split(':'); return parseInt(p[0], 10) * 60 + (parseInt(p[1], 10) || 0); }
function tbBlocksHtml(blocks) {
  let h = '';
  blocks.forEach(function(b) {
    let left = 0, width = 100;
    if (b.start_time) {
      const s = Math.max(hm2m(b.start_time), TL_START);
      const e = Math.min(b.end_time ? hm2m(b.end_time) : TL_END, TL_END);
      if (e <= s) return;
      left = (s - TL_START) / TL_TOTAL * 100;
      width = (e - s) / TL_TOTAL * 100;
    }
    h += '<div class="tbblk" data-bid="' + b.id + '" style="left:' + left + '%;width:' + width + '%"'
      + ' title="タップで削除: ' + esc(b.reason + ' （登録: ' + (b.created_by_name || '') + '）') + '">'
      + esc(b.reason) + (b.start_time ? '' : '（終日）') + '</div>';
  });
  return h;
}
function blocksFor(blocks, staffName, dateStr) {
  return blocks.filter(function(b) {
    return nw(b.staff_name) === nw(staffName) && (!dateStr || b.date === dateStr);
  });
}
function unionStaffs(rows, blocks) {
  const s = {};
  rows.forEach(function(r) { resStaffs(r).forEach(function(n) { s[n] = true; }); });
  blocks.forEach(function(b) { if (b.staff_name) s[b.staff_name] = true; });
  return Object.keys(s).sort();
}
function wireBlockDelete(rerender) {
  Array.prototype.forEach.call(document.querySelectorAll('.tbblk'), function(el) {
    el.onclick = async function() {
      if (!confirm('この休み/ブロックを削除しますか？')) return;
      await sb.from('crm_time_blocks').delete().eq('id', el.getAttribute('data-bid'));
      rerender();
    };
  });
}
function blockFormHtml(staffs, selStaff, dateVal) {
  let opts = '';
  staffs.forEach(function(n) { opts += '<option' + (nw(n) === nw(selStaff) ? ' selected' : '') + '>' + esc(n) + '</option>'; });
  return '<div class="card tbform" id="tbForm" hidden>'
    + '<select id="tbStaff">' + opts + '</select>'
    + '<input type="date" id="tbDate" value="' + dateVal + '">'
    + '<label><input type="checkbox" id="tbAll"> 終日</label>'
    + '<input type="time" id="tbFrom" value="09:00">〜<input type="time" id="tbTo" value="21:00">'
    + '<select id="tbReason"><option>休み</option><option>ブロック</option><option>休憩</option><option>研修</option></select>'
    + '<button class="btn" id="tbAdd">追加</button>'
    + '</div>';
}
function wireBlockForm(rerender) {
  const toggle = document.getElementById('tbToggle');
  const form = document.getElementById('tbForm');
  if (!toggle || !form) return;
  toggle.onclick = function() { form.hidden = !form.hidden; };
  document.getElementById('tbAll').onchange = function(e) {
    document.getElementById('tbFrom').disabled = e.target.checked;
    document.getElementById('tbTo').disabled = e.target.checked;
  };
  document.getElementById('tbAdd').onclick = async function() {
    const all = document.getElementById('tbAll').checked;
    const { data: sess } = await sb.auth.getUser();
    const u = sess && sess.user;
    const payload = {
      staff_name: document.getElementById('tbStaff').value,
      date: document.getElementById('tbDate').value,
      start_time: all ? null : document.getElementById('tbFrom').value,
      end_time: all ? null : document.getElementById('tbTo').value,
      reason: document.getElementById('tbReason').value,
      created_by_name: (u && u.user_metadata && u.user_metadata.name) || (u && u.email) || '',
    };
    if (!payload.staff_name || !payload.date) return;
    const { error } = await sb.from('crm_time_blocks').insert(payload);
    if (error) { alert('追加できませんでした: ' + error.message); return; }
    rerender();
  };
}
function dayNameCls(d, today) {
  const w = wdow(d);
  let cls = '';
  if (w === 6) cls = ' sat';
  if (w === 0) cls = ' sun';
  return cls + (d === today ? '" style="text-decoration:underline' : '');
}

let MY_STAFF = null;
async function myStaffName() {
  if (MY_STAFF !== null) return MY_STAFF;
  try {
    const { data } = await sb.from('crm_staff_allowlist').select('display_name');
    MY_STAFF = (data && data[0] && data[0].display_name) || '';
  } catch (e) { MY_STAFF = ''; }
  return MY_STAFF;
}
function resStaffs(r) { return (r.staff_names && r.staff_names.length) ? r.staff_names : ['担当未設定']; }
function staffSet(rows) {
  const s = {};
  rows.forEach(function(r) { resStaffs(r).forEach(function(n) { s[n] = true; }); });
  return Object.keys(s).sort();
}
function byStaff(rows, name) {
  return rows.filter(function(r) { return resStaffs(r).some(function(n) { return nw(n) === nw(name); }); });
}
function tlHeadHtml() {
  let h = '<div class="tlhead"><div class="tlname"></div><div class="tltrack">';
  for (let m = TL_START; m < TL_END; m += 60) {
    h += '<span class="tlhour" style="left:' + ((m - TL_START) / TL_TOTAL * 100) + '%">' + (m / 60) + ':00</span>';
  }
  return h + '</div></div>';
}
function tlBlocksHtml(rows, checks) {
  let h = '';
  rows.forEach(function(r) {
    let s = minsOf(r.booking_start);
    let e = r.booking_end ? minsOf(r.booking_end) : s + 50;
    if (e <= s) e = s + 50;
    s = Math.max(s, TL_START); e = Math.min(e, TL_END);
    if (e <= TL_START || s >= TL_END) return;
    const left = (s - TL_START) / TL_TOTAL * 100;
    const width = (e - s) / TL_TOTAL * 100;
    const done = checks && checks[r.reservation_id] ? '✓' : '';
    h += '<a class="tlblock" style="left:' + left + '%;width:' + width + '%;background:' + storeColor(r.store_tag) + (done ? ';opacity:.75' : '') + '"'
      + ' href="#/c/' + encodeURIComponent(r.merchant_id) + '/' + r.customer_id + '"'
      + ' title="' + esc(fmtTime(r.booking_start) + ' ' + (r.customer_name || '') + ' / ' + (r.menu || '') + '【' + (r.store_tag || '') + '】') + '">'
      + done + esc(r.customer_name || '予約') + '</a>';
  });
  return h;
}
function tlTabsHtml(mode, date, staff) {
  const ym = date.slice(0, 7);
  return '<div class="tabs">'
    + '<a class="' + (mode === 'day' ? 'on' : '') + '" href="' + tlHash('day', { date: date, staff: staff }) + '">日</a>'
    + '<a class="' + (mode === 'week' ? 'on' : '') + '" href="' + tlHash('week', { date: date, staff: staff }) + '">週</a>'
    + '<a class="' + (mode === 'month' ? 'on' : '') + '" href="' + tlHash('month', { ym: ym, staff: staff, date: date }) + '">月</a>'
    + '</div>';
}
async function renderTimeline(params) {
  const mode = params.get('mode') || 'day';
  const today = jstToday();
  const date = params.get('date') || today;
  let staff = params.get('staff') || '';
  app.innerHTML = '<div class="empty">読み込み中…</div>';

  if (mode === 'day') {
    const { data, error } = await fetchRange(date, addDays(date, 1));
    if (error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(error.message) + '</div>'; return; }
    const dayChecks = await fetchChecks(date, addDays(date, 1));
    const dayBlocks = await fetchBlocks(date, addDays(date, 1));
    const storeSel = params.get('store') || '';
    const stores = {};
    data.forEach(function(r) { if (r.store_tag) stores[r.store_tag] = true; });
    const rows = storeSel ? data.filter(function(r) { return r.store_tag === storeSel; }) : data;

    let html = tlTabsHtml('day', date, staff);
    html += '<div class="selbar">'
      + '<button id="tlPrev">←</button>'
      + '<input type="date" id="tlDate" value="' + date + '">'
      + '<button id="tlNext">→</button>'
      + '<button id="tlToday">今日</button>'
      + '<span style="font-weight:700">' + fmtMD(date) + '　' + rows.length + '件</span>'
      + '<button id="tbToggle">＋休み/ブロック</button>'
      + '<a href="https://coubic.com/dashboard" target="_blank" rel="noopener" style="margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none">＋STORESで予約登録</a>'
      + '</div>';
    html += '<div class="chips"><a class="' + (storeSel ? '' : 'on') + '" href="' + tlHash('day', { date: date }) + '">全店</a>';
    Object.keys(stores).sort().forEach(function(st) {
      html += '<a class="' + (storeSel === st ? 'on' : '') + '" href="' + tlHash('day', { date: date, store: st }) + '">' + esc(st) + '</a>';
    });
    html += '</div>';

    const staffs = unionStaffs(rows, dayBlocks);
    html += blockFormHtml(staffs, staffs[0] || '', date);
    if (!staffs.length) {
      html += '<div class="empty">この日の予約はありません</div>';
    } else {
      html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
      staffs.forEach(function(st) {
        html += '<div class="tlrow"><div class="tlname">' + esc(st) + '</div><div class="tltrack">'
          + tbBlocksHtml(blocksFor(dayBlocks, st, date))
          + tlBlocksHtml(byStaff(rows, st), dayChecks) + '</div></div>';
      });
      html += '</div></div>';
    }
    app.innerHTML = html;
    const rerenderDay = function() { renderTimeline(params); };
    wireBlockDelete(rerenderDay);
    wireBlockForm(rerenderDay);
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash('day', { date: addDays(date, -1), store: storeSel }); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash('day', { date: addDays(date, 1), store: storeSel }); };
    document.getElementById('tlToday').onclick = function() { location.hash = tlHash('day', {}); };
    document.getElementById('tlDate').onchange = function(e) { location.hash = tlHash('day', { date: e.target.value, store: storeSel }); };
    return;
  }

  if (mode === 'week' || mode === 'month') {
    // 週＝7日、月＝月曜始まりでその月を含む全週。日付を縦に積んだタイムライン（週の延長線上に月がある表示）
    let start, daysN, label, prevKey, nextKey;
    if (mode === 'week') {
      start = weekStart(date);
      daysN = 7;
      label = fmtMD(start) + '〜' + fmtMD(addDays(start, 6));
      prevKey = { date: addDays(start, -7), staff: staff };
      nextKey = { date: addDays(start, 7), staff: staff };
    } else {
      const ym = (params.get('ym') || date.slice(0, 7));
      const first = ym + '-01';
      const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
      const last = ym + '-' + String(dim).padStart(2, '0');
      start = weekStart(first);                       // 月曜始まり
      const endW = addDays(weekStart(last), 7);       // 最終週の日曜まで
      daysN = Math.round((new Date(endW + 'T12:00:00+09:00') - new Date(start + 'T12:00:00+09:00')) / 86400000);
      label = parseInt(ym.slice(0, 5), 10) + '年' + parseInt(ym.slice(5, 7), 10) + '月';
      prevKey = { ym: addDays(first, -1).slice(0, 7), staff: staff, date: date };
      nextKey = { ym: addDays(last, 1).slice(0, 7), staff: staff, date: date };
    }
    const endExcl = addDays(start, daysN);
    const [resQ, checks, blocks] = await Promise.all([
      fetchRange(start, endExcl), fetchChecks(start, endExcl), fetchBlocks(start, endExcl),
    ]);
    if (resQ.error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(resQ.error.message) + '</div>'; return; }
    const data = resQ.data || [];
    const staffs = unionStaffs(data, blocks);
    if (!staff) {
      const mine = await myStaffName();
      staff = staffs.find(function(n) { return nw(n) === nw(mine); }) || staffs[0] || '';
    }
    const rows = byStaff(data, staff);
    const dayMap = {};
    rows.forEach(function(r) {
      const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
      (dayMap[d] = dayMap[d] || []).push(r);
    });

    let html = tlTabsHtml(mode, date, staff);
    html += '<div class="selbar">'
      + '<button id="tlPrev">←</button>'
      + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
      + '<button id="tlNext">→</button>'
      + '<select id="tlStaff"></select>'
      + '<span style="color:var(--sub)">' + rows.length + '件</span>'
      + '<button id="tbToggle">＋休み/ブロック</button>'
      + '<a href="https://coubic.com/dashboard" target="_blank" rel="noopener" style="margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none">＋STORESで予約登録</a>'
      + '</div>';
    html += blockFormHtml(staffs, staff, (today >= start && today < endExcl) ? today : start);
    html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
    for (let i = 0; i < daysN; i++) {
      const d = addDays(start, i);
      html += '<div class="tlrow"' + (i % 7 === 0 && i > 0 ? ' style="border-top:2px solid #cdd6d2"' : '') + '>'
        + '<div class="tlname' + dayNameCls(d, today) + '">' + fmtMD(d) + '</div>'
        + '<div class="tltrack">'
        + tbBlocksHtml(blocksFor(blocks, staff, d))
        + tlBlocksHtml(dayMap[d] || [], checks)
        + '</div></div>';
    }
    html += '</div></div>';
    app.innerHTML = html;

    const sel = document.getElementById('tlStaff');
    staffs.forEach(function(n) {
      const o = document.createElement('option');
      o.value = n; o.textContent = n; if (nw(n) === nw(staff)) o.selected = true;
      sel.appendChild(o);
    });
    const keyBase = mode === 'week' ? { date: date } : { ym: (params.get('ym') || date.slice(0, 7)), date: date };
    sel.onchange = function(e) {
      const kv = {}; Object.keys(keyBase).forEach(function(k) { kv[k] = keyBase[k]; });
      kv.staff = e.target.value;
      location.hash = tlHash(mode, kv);
    };
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash(mode, prevKey); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash(mode, nextKey); };
    const rerenderWk = function() { renderTimeline(params); };
    wireBlockDelete(rerenderWk);
    wireBlockForm(rerenderWk);
    return;
  }
}

// ── 日報・集計（スタッフ別の件数・対応済み・稼働・埋まり率・売上） ──
function durMins(r) {
  const s = minsOf(r.booking_start);
  let e = r.booking_end ? minsOf(r.booking_end) : s + 50;
  if (e <= s) e = s + 50;
  return e - s;
}
async function renderReport(params) {
  const range = params.get('range') || 'day';
  const today = jstToday();
  const date = params.get('date') || today;
  app.innerHTML = '<div class="empty">読み込み中…</div>';

  let from, toExcl, label, prevD, nextD;
  if (range === 'day') {
    from = date; toExcl = addDays(date, 1); label = fmtMD(date);
    prevD = addDays(date, -1); nextD = addDays(date, 1);
  } else if (range === 'week') {
    from = weekStart(date); toExcl = addDays(from, 7);
    label = fmtMD(from) + '〜' + fmtMD(addDays(from, 6));
    prevD = addDays(from, -7); nextD = addDays(from, 7);
  } else {
    const ym = date.slice(0, 7);
    from = ym + '-01';
    const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
    toExcl = addDays(ym + '-' + String(dim).padStart(2, '0'), 1);
    label = parseInt(ym.slice(0, 5), 10) + '年' + parseInt(ym.slice(5, 7), 10) + '月';
    prevD = addDays(from, -1).slice(0, 7) + '-01'; nextD = toExcl;
  }
  const daysN = Math.max(1, Math.round((new Date(toExcl + 'T00:00:00+09:00') - new Date(from + 'T00:00:00+09:00')) / 86400000));

  const [resQ, checks, karteQ] = await Promise.all([
    fetchRange(from, toExcl),
    fetchChecks(from, toExcl),
    sb.from('crm_karte_notes').select('author_name, created_at')
      .gte('created_at', from + 'T00:00:00+09:00').lt('created_at', toExcl + 'T00:00:00+09:00').limit(2000),
  ]);
  if (resQ.error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(resQ.error.message) + '</div>'; return; }
  const rows = resQ.data || [];

  const agg = {};
  rows.forEach(function(r) {
    const st = resStaffs(r)[0];
    const a = (agg[st] = agg[st] || { count: 0, done: 0, mins: 0, rev: 0 });
    a.count++;
    if (checks[r.reservation_id]) a.done++;
    a.mins += durMins(r);
    a.rev += Number(r.price) || 0;
  });
  const karteBy = {};
  (karteQ.data || []).forEach(function(n) {
    const nm = n.author_name || '（無記名）';
    karteBy[nm] = (karteBy[nm] || 0) + 1;
  });

  const cap = daysN * 720; // 9:00〜21:00 = 12h/日 基準
  function hrs(m) { return (Math.round(m / 6) / 10) + 'h'; }

  let html = '<div class="tabs">'
    + '<a class="' + (range === 'day' ? 'on' : '') + '" href="#/report?range=day&date=' + date + '">日</a>'
    + '<a class="' + (range === 'week' ? 'on' : '') + '" href="#/report?range=week&date=' + date + '">週</a>'
    + '<a class="' + (range === 'month' ? 'on' : '') + '" href="#/report?range=month&date=' + date + '">月</a>'
    + '</div>';
  html += '<div class="selbar">'
    + '<button id="rpPrev">←</button>'
    + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
    + '<button id="rpNext">→</button>'
    + '<span style="color:var(--sub)">全' + rows.length + '件</span>'
    + '</div>';

  if (!rows.length) {
    html += '<div class="empty">この期間の予約はありません</div>';
  } else {
    let tc = 0, td = 0, tm = 0, tr = 0;
    html += '<div class="tlwrap" style="padding:0"><table class="rep"><thead><tr>'
      + '<th>スタッフ</th><th>件数</th><th>✓済み</th><th>稼働</th><th>埋まり率</th><th>売上</th></tr></thead><tbody>';
    Object.keys(agg).sort().forEach(function(st) {
      const a = agg[st];
      tc += a.count; td += a.done; tm += a.mins; tr += a.rev;
      const rate = Math.round(a.mins / cap * 100);
      html += '<tr><td>' + esc(st) + '</td><td>' + a.count + '</td>'
        + '<td>' + a.done + '/' + a.count + '</td>'
        + '<td>' + hrs(a.mins) + '</td>'
        + '<td>' + rate + '%<div class="bar"><span style="width:' + Math.min(rate, 100) + '%"></span></div></td>'
        + '<td>' + a.rev.toLocaleString('ja-JP') + '円</td></tr>';
    });
    html += '<tr class="tot"><td>合計</td><td>' + tc + '</td><td>' + td + '/' + tc + '</td>'
      + '<td>' + hrs(tm) + '</td><td>-</td><td>' + tr.toLocaleString('ja-JP') + '円</td></tr>';
    html += '</tbody></table></div>';
    html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px">※埋まり率は営業12h（9:00〜21:00）×' + daysN + '日を100%とした目安。売上はレッスン料ベース（月謝・回数券払いは0円計上）</div>';
  }

  html += '<div class="card" style="margin-top:12px"><h2>📝 カルテ記入</h2>';
  const kNames = Object.keys(karteBy);
  if (!kNames.length) {
    html += '<div class="empty" style="padding:10px 0">この期間のカルテ記入はまだありません</div>';
  } else {
    kNames.sort().forEach(function(nm) {
      html += '<div class="hist"><span style="flex:1">' + esc(nm) + '</span><span>' + karteBy[nm] + '件</span></div>';
    });
  }
  html += '</div>';

  app.innerHTML = html;
  document.getElementById('rpPrev').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + prevD; };
  document.getElementById('rpNext').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + nextD; };
}

// ── ルーター ──────────────────────────────
async function render() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { renderLogin(); return; }
  topbar.hidden = false;

  const hash = location.hash || '#/';
  const m = hash.match(/^#\/c\/([^/]+)\/(\d+)/);
  if (m) { renderCustomer(decodeURIComponent(m[1]), m[2]); return; }
  if (hash.indexOf('#/tl') === 0) {
    renderTimeline(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/report') === 0) {
    renderReport(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/search') === 0) {
    const q = new URLSearchParams(hash.split('?')[1] || '').get('q') || '';
    renderSearch(q); return;
  }
  const dateQ = new URLSearchParams(hash.split('?')[1] || '').get('date') || '';
  renderDay(dateQ);
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
