  .pgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:start;

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
const TZ = 'Asia/Tokyo';
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', timeZone:TZ });
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ja-JP', { year:'numeric', month:'numeric', day:'numeric', weekday:'short', timeZone:TZ });
}
function jstToday() {
  const p = new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(new Date());
  return p; // YYYY-MM-DD
}
function addDays(dstr, n) {
  const d = new Date(dstr + 'T00:00:00+09:00');
  d.setUTCDate(d.getUTCDate() + n);
  return new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(d);
}
const STORE_COLORS = ['#2f6f5f', '#5a67a5', '#b0743a', '#8a5aa5', '#3a7fb0'];
function storeColor(tag) {
  let h = 0; const s = String(tag || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return STORE_COLORS[h % STORE_COLORS.length];
}
function qaItems(arr) {
  // profile_fields / questionnaires гҒӢгӮү {question, answer} гӮ’жұҺз”ЁгҒ«еҸ–гӮҠеҮәгҒҷ
  const out = [];
  function walk(x) {
    if (!x) return;
    if (Array.isArray(x)) { x.forEach(walk); return; }
    if (typeof x === 'object') {
      if (x.question) {
        out.push({ q: x.question, a: (x.answer != null ? x.answer : (x.answers || '')) });
      }
      Object.keys(x).forEach(function(k) { if (k !== 'question' && k !== 'answer') walk(x[k]); });
    }
  }
  walk(arr);
  return out;
}

  });
  const results = await Promise.all(jobs);
  for (let i = 0; i < results.length; i += 3) {
    (results[i].data || []).forEach(function(x) { out.labels[custKey(x.merchant_id, x.customer_id)] = x; });
    (results[i + 1].data || []).forEach(function(x) { out.stats[custKey(x.merchant_id, x.customer_id)] = x; });
    (results[i + 2].data || []).forEach(function(x) {

function _shoffDiv(a, b) {
  return '<div class="shoff" style="left:' + ((a - TL_START) / TL_TOTAL * 100) + '%;width:' + ((b - a) / TL_TOTAL * 100) + '%"></div>';
}
function shiftShadeHtml(sh, codes) {
  if (!sh) return '';
  if (sh.kind === 'off') return '<div class="shoff offday" style="left:0;width:100%">рҹҢҷ ' + esc(sh.label || 'дј‘гҒҝ') + '</div>';
  if (sh.kind === 'other') return '<div class="shoff oth" style="left:0;width:100%">' + esc(sh.label || '') + '</div>';
  let src = null;
  if (sh.start_time) src = sh;
  else if (sh.code && codes[sh.code] && codes[sh.code].start_time) src = codes[sh.code];
  if (!src) return '';
  // еӢӨеӢҷеҢәй–“пјҲдёӯжҠңгҒ‘гӮ·гғ•гғҲгҒҜ2еҢәй–“пјүгҒ®еӨ–еҒҙгӮ’ж–ңз·ҡгҒ§еЎ—гӮӢ
  const segs = [[hm2m(src.start_time), hm2m(src.end_time)]];
  if (src.start2) segs.push([hm2m(src.start2), hm2m(src.end2)]);
  segs.sort(function(x, y) { return x[0] - y[0]; });
  let h = '';
  let cur = TL_START;
  segs.forEach(function(sg) {
    const s = Math.max(sg[0], TL_START);
    const e = Math.min(sg[1], TL_END);
    if (s > cur) h += _shoffDiv(cur, s);
    cur = Math.max(cur, e);
  });
  if (cur < TL_END) h += _shoffDiv(cur, TL_END);

function fmtAgo(iso) {
  // гҖҢд»Ҡж—Ҙ 14:02гҖҚгҖҢжҳЁж—ҘгҖҚгҖҢ3ж—ҘеүҚпјҲ7/13пјүгҖҚвҖ” жғ…е ұгҒ®й®®еәҰгҒҢдёҖзӣ®гҒ§еҲҶгҒӢгӮӢиЎЁиЁҳ
  if (!iso) return '';
  const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(iso));
  const today = jstToday();
  const diff = Math.round((new Date(today + 'T12:00:00+09:00') - new Date(d + 'T12:00:00+09:00')) / 86400000);
  const md = parseInt(d.slice(5, 7), 10) + '/' + parseInt(d.slice(8, 10), 10);
  if (diff <= 0) return 'д»Ҡж—Ҙ ' + fmtTime(iso);
  if (diff === 1) return 'жҳЁж—ҘпјҲ' + md + 'пјү';
  return diff + 'ж—ҘеүҚпјҲ' + md + 'пјү';
}

    // еә—иҲ—гҒ§зөһгӮҠиҫјгҒҝдёӯгҒҜгҖҒгҒқгҒ®еә—иҲ—гҒ«дәҲзҙ„гҒҫгҒҹгҒҜгӮ·гғ•гғҲгҒҢгҒӮгӮӢдәәгҒ гҒ‘иЎЁзӨә
    if (storeSel) {
      staffs = staffs.filter(function(st) {
        if (byStaff(rows, st).length) return true;
        const sh = shiftFor(dayShifts, st, date);
        return sh && sh.store && SHIFT_STORE_TAG[sh.store] === storeSel;
      });
    }
    // гғӯгӮ°гӮӨгғіжң¬дәәгҒ®иЎҢгӮ’жңҖдёҠйғЁгҒ«
    staffs.sort(function(a, b) {
      const am = nw(a) === nw(mineName) ? 0 : 1;
      const bm = nw(b) === nw(mineName) ? 0 : 1;
      return am - bm || a.localeCompare(b);
    });
    if (mineOnly) staffs = staffs.filter(function(st) { return nw(st) === nw(mineName); });
    html += blockFormHtml(staffs, staffs[0] || '', date);
    if (!staffs.length) {
      html += '<div class="empty">гҒ“гҒ®ж—ҘгҒ®дәҲзҙ„гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
    } else {
      html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
      staffs.forEach(function(st) {
        const me = nw(st) === nw(mineName) ? ' me' : '';
        const sh = shiftFor(dayShifts, st, date);
        html += '<div class="tlrow"><div class="tlname' + me + '">' + (me ? 'рҹ‘Ө ' : '') + esc(st) + shiftTagHtml(sh, codes) + '</div><div class="tltrack" data-staff="' + esc(st) + '" data-date="' + date + '">'
          + shiftShadeHtml(sh, codes)
          + availBlocksHtml(availFor(dayAvail, st, date))
          + tbBlocksHtml(blocksFor(dayBlocks, st, date))
          + calBlocksHtml(calFor(dayCal, st, date))
          + tlBlocksHtml(byStaff(rows, st), dayChecks, dayMeta) + '</div></div>';
      });
      html += '</div></div>';
      html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px"><span style="color:#1f6f54;font-weight:700">з·‘зӮ№з·ҡгҖҢз©әгҖҚпјқд»ҠгҒҠе®ўж§ҳгҒҢдәҲзҙ„гҒ§гҒҚгӮӢжһ пјҲSTORESе…¬й–Ӣжғ…е ұгғ»10еҲҶгҒ”гҒЁжӣҙж–°пјү</span>пҪңж–ңз·ҡпјқгӮ·гғ•гғҲеӨ–гғ»дј‘гҒҝгғ»дјҡиӯ°пјҲгӮ·гғ•гғҲиЎЁ/гӮ«гғ¬гғігғҖгғјгҒӢгӮүиҮӘеӢ•пјүпҪңгӮ°гғ¬гғјпјқеӣәе®ҡгғ–гғӯгғғгӮҜпјҲдј‘жҶ©гғ»дј‘гҒҝпјүпҪң<span style="color:#805e12;font-weight:700">зҗҘзҸҖвҶ”пјқеӢ•гҒӢгҒӣгӮӢгғ–гғӯгғғгӮҜ</span>гҖӮз·‘гӮӮгӮ°гғ¬гғјгӮӮз„ЎгҒ„жҷӮй–“пјқSTORESеҒҙгҒ§гғ–гғӯгғғгӮҜжёҲгҒҝгҒӢеҸ—д»ҳеҜҫиұЎеӨ–гҒ§гҒҷ</div>';
    }
    app.innerHTML = html;
    const rerenderDay = function() { renderTimeline(params); };
    wireBlockDelete(rerenderDay);
    wireBlockForm(rerenderDay);
    wireTrackQuickAdd();
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash('day', { date: addDays(date, -1), store: storeSel }); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash('day', { date: addDays(date, 1), store: storeSel }); };
    document.getElementById('tlToday').onclick = function() { location.hash = tlHash('day', {}); };
    document.getElementById('tlDate').onchange = function(e) { location.hash = tlHash('day', { date: e.target.value, store: storeSel }); };
    return;
  }

  if (mode === 'week' || mode === 'month') {
    // йҖұпјқ7ж—ҘгҖҒжңҲпјқжңҲжӣңе§ӢгҒҫгӮҠгҒ§гҒқгҒ®жңҲгӮ’еҗ«гӮҖе…ЁйҖұгҖӮж—Ҙд»ҳгӮ’зёҰгҒ«з©ҚгӮ“гҒ гӮҝгӮӨгғ гғ©гӮӨгғіпјҲйҖұгҒ®е»¶й•·з·ҡдёҠгҒ«жңҲгҒҢгҒӮгӮӢиЎЁзӨәпјү
    let start, daysN, label, prevKey, nextKey;
    if (mode === 'week') {
      start = weekStart(date);
      daysN = 7;
      label = fmtMD(start) + 'гҖң' + fmtMD(addDays(start, 6));
      prevKey = { date: addDays(start, -7), staff: staff };
      nextKey = { date: addDays(start, 7), staff: staff };
    } else {
      const ym = (params.get('ym') || date.slice(0, 7));
      const first = ym + '-01';
      const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
      const last = ym + '-' + String(dim).padStart(2, '0');
      start = weekStart(first);                       // жңҲжӣңе§ӢгҒҫгӮҠ
      const endW = addDays(weekStart(last), 7);       // жңҖзөӮйҖұгҒ®ж—ҘжӣңгҒҫгҒ§
      daysN = Math.round((new Date(endW + 'T12:00:00+09:00') - new Date(start + 'T12:00:00+09:00')) / 86400000);
      label = parseInt(ym.slice(0, 5), 10) + 'е№ҙ' + parseInt(ym.slice(5, 7), 10) + 'жңҲ';
      prevKey = { ym: addDays(first, -1).slice(0, 7), staff: staff, date: date };
      nextKey = { ym: addDays(last, 1).slice(0, 7), staff: staff, date: date };
    }
    const endExcl = addDays(start, daysN);
    const [resQ, checks, blocks, shifts, codes, calEvts, avail] = await Promise.all([
      fetchRange(start, endExcl), fetchChecks(start, endExcl), fetchBlocks(start, endExcl),
      fetchShifts(start, endExcl), shiftCodes(), fetchCalEvents(start, endExcl), fetchAvail(start, endExcl),
    ]);
    if (resQ.error) { app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј: ' + esc(resQ.error.message) + '</div>'; return; }
    const data = resQ.data || [];
    const wkMeta = await fetchCustMeta(data);
    const staffs = unionStaffs(data, blocks);
    // гӮ·гғ•гғҲиЎЁгҒ«ијүгҒЈгҒҰгҒ„гӮӢдәәпјҲеӨ§ең°гҒ•гӮ“зӯүгғ»дәҲзҙ„гӮјгғӯгҒ§гӮӮпјүгӮ’йҒёжҠһиӮўгҒ«еҗ«гӮҒгӮӢ
    shiftStaffs(shifts, null).forEach(function(sn) {
      if (!staffs.some(function(x) { return nw(x) === nw(sn); })) staffs.push(sn);
    });
    staffs.sort();
    if (!staff) {
      const mine = await myStaffName();
      staff = staffs.find(function(n) { return nw(n) === nw(mine); }) || staffs[0] || '';
    }
    const allMode = staff === '*';
    const rows = allMode ? data : byStaff(data, staff);
    const dayMap = {};
    data.forEach(function(r) {
      const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
      (dayMap[d] = dayMap[d] || []).push(r);
    });

    let html = tlTabsHtml(mode, date, staff);
    html += '<div class="selbar">'
      + '<button id="tlPrev">вҶҗ</button>'
      + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
      + '<button id="tlNext">вҶ’</button>'
      + '<select id="tlStaff"></select>'
      + '<span style="color:var(--sub)">' + rows.length + 'д»¶</span>'
      + '<button id="tbToggle">пјӢдј‘гҒҝ/гғ–гғӯгғғгӮҜ</button>'
      + '<a href="https://coubic.com/dashboard" target="_blank" rel="noopener" style="margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none">пјӢSTORESгҒ§дәҲзҙ„зҷ»йҢІ</a>'
      + '</div>';
    html += blockFormHtml(staffs, allMode ? '' : staff, (today >= start && today < endExcl) ? today : start);
    html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
    for (let i = 0; i < daysN; i++) {
      const d = addDays(start, i);
      const dayRows = dayMap[d] || [];
      if (allMode) {
        // е…ЁгӮ№гӮҝгғғгғ•: ж—Ҙд»ҳиҰӢеҮәгҒ— + гҒқгҒ®ж—ҘгҒ®гӮ№гӮҝгғғгғ•иЎҢгӮ’зёҰгҒ«з©ҚгӮҖпјҲгғҜгғігғўгӮўз®ЎзҗҶз”»йқўйўЁпјү
        html += '<div class="tlday' + (d === today ? '" style="color:var(--accent)' : '') + '">' + fmtMD(d) + 'гҖҖ<span style="font-weight:400;color:var(--sub)">' + dayRows.length + 'д»¶</span></div>';
        let ds = staffSet(dayRows);
        shiftStaffs(shifts, d).forEach(function(sn) {
          if (!ds.some(function(x) { return nw(x) === nw(sn); })) ds.push(sn);
        });
        ds.sort();
        if (!ds.length) {
          html += '<div class="tlrow"><div class="tlname" style="color:var(--sub);font-weight:400">вҖ”</div><div class="tltrack"></div></div>';
        }
        ds.forEach(function(st) {
          const sh = shiftFor(shifts, st, d);
          html += '<div class="tlrow"><div class="tlname">' + esc(st) + shiftTagHtml(sh, codes) + '</div><div class="tltrack" data-staff="' + esc(st) + '" data-date="' + d + '">'
            + shiftShadeHtml(sh, codes)
            + availBlocksHtml(availFor(avail, st, d))
            + tbBlocksHtml(blocksFor(blocks, st, d))
            + calBlocksHtml(calFor(calEvts, st, d))
            + tlBlocksHtml(byStaff(dayRows, st), checks, wkMeta)
            + '</div></div>';
        });
      } else {
        const sh = shiftFor(shifts, staff, d);
        html += '<div class="tlrow"' + (i % 7 === 0 && i > 0 ? ' style="border-top:2px solid #cdd6d2"' : '') + '>'
          + '<div class="tlname' + dayNameCls(d, today) + '">' + fmtMD(d) + shiftTagHtml(sh, codes) + '</div>'
          + '<div class="tltrack" data-staff="' + esc(staff) + '" data-date="' + d + '">'
          + shiftShadeHtml(sh, codes)
          + availBlocksHtml(availFor(avail, staff, d))
          + tbBlocksHtml(blocksFor(blocks, staff, d))
          + calBlocksHtml(calFor(calEvts, staff, d))
          + tlBlocksHtml(byStaff(dayRows, staff), checks, wkMeta)
          + '</div></div>';
      }
    }
    html += '</div></div>';
    app.innerHTML = html;

    const sel = document.getElementById('tlStaff');
    const oAll = document.createElement('option');
    oAll.value = '*'; oAll.textContent = 'е…ЁгӮ№гӮҝгғғгғ•'; if (allMode) oAll.selected = true;
    sel.appendChild(oAll);
    staffs.forEach(function(n) {
      const o = document.createElement('option');
      o.value = n; o.textContent = n; if (!allMode && nw(n) === nw(staff)) o.selected = true;
      sel.appendChild(o);
    });
    const keyBase = mode === 'week' ? { date: date } : { ym: (params.get('ym') || date.slice(0, 7)), date: date };
    sel.onchange = function(e) {
      const kv = {}; Object.keys(keyBase).forEach(function(k) { kv[k] = keyBase[k]; });
      kv.staff = e.target.value;
      location.hash = tlHash(mode, kv);
    };
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash(mode, prevKey); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash(mode, nextKey); };
    const rerenderWk = function() { renderTimeline(params); };
    wireBlockDelete(rerenderWk);
    wireBlockForm(rerenderWk);
    wireTrackQuickAdd();
    return;
  }
}

// в”Җв”Җ ж—Ҙе ұгғ»йӣҶиЁҲпјҲгӮ№гӮҝгғғгғ•еҲҘгҒ®д»¶ж•°гғ»еҜҫеҝңжёҲгҒҝгғ»зЁјеғҚгғ»еҹӢгҒҫгӮҠзҺҮгғ»еЈІдёҠпјү в”Җв”Җ
function durMins(r) {
  const s = minsOf(r.booking_start);
  let e = r.booking_end ? minsOf(r.booking_end) : s + 50;
  if (e <= s) e = s + 50;
  return e - s;
}
async function renderReport(params) {
  const range = params.get('range') || 'day';
  const today = jstToday();
  const date = params.get('date') || today;
  app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝдёӯвҖҰ</div>';

  let from, toExcl, label, prevD, nextD;
  if (range === 'day') {
    from = date; toExcl = addDays(date, 1); label = fmtMD(date);
    prevD = addDays(date, -1); nextD = addDays(date, 1);
  } else if (range === 'week') {
    from = weekStart(date); toExcl = addDays(from, 7);
    label = fmtMD(from) + 'гҖң' + fmtMD(addDays(from, 6));
    prevD = addDays(from, -7); nextD = addDays(from, 7);
  } else {
    const ym = date.slice(0, 7);
    from = ym + '-01';
    const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
    toExcl = addDays(ym + '-' + String(dim).padStart(2, '0'), 1);
    label = parseInt(ym.slice(0, 5), 10) + 'е№ҙ' + parseInt(ym.slice(5, 7), 10) + 'жңҲ';
    prevD = addDays(from, -1).slice(0, 7) + '-01'; nextD = toExcl;
  }
  const daysN = Math.max(1, Math.round((new Date(toExcl + 'T00:00:00+09:00') - new Date(from + 'T00:00:00+09:00')) / 86400000));

  const [resQ, checks, karteQ] = await Promise.all([
    fetchRange(from, toExcl),
    fetchChecks(from, toExcl),
    sb.from('crm_karte_notes').select('merchant_id, customer_id, author_name, created_at')
      .gte('created_at', from + 'T00:00:00+09:00').lt('created_at', toExcl + 'T00:00:00+09:00').limit(2000),
  ]);
  if (resQ.error) { app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј: ' + esc(resQ.error.message) + '</div>'; return; }
  const rows = resQ.data || [];

  // гҖҢйЎ§е®ўГ—ж—ҘгҖҚгҒ§гҒқгҒ®ж—ҘгҒ«гӮ«гғ«гғҶгҒҢжӣёгҒӢгӮҢгҒҹгҒӢгӮ’еҲӨе®ҡгҒ§гҒҚгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢ
  const karteSet = {};
  const karteBy = {};
  (karteQ.data || []).forEach(function(n) {
    const nm = n.author_name || 'пјҲз„ЎиЁҳеҗҚпјү';
    karteBy[nm] = (karteBy[nm] || 0) + 1;
    const kd = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(n.created_at));
    karteSet[n.merchant_id + '|' + n.customer_id + '|' + kd] = true;
  });

  const agg = {};
  rows.forEach(function(r) {
    const st = resStaffs(r)[0];
    const a = (agg[st] = agg[st] || { count: 0, done: 0, mins: 0, rev: 0, kd: 0 });
    a.count++;
    if (checks[r.reservation_id]) a.done++;
    const rd = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
    if (karteSet[r.merchant_id + '|' + r.customer_id + '|' + rd]) a.kd++;
    a.mins += durMins(r);
    a.rev += Number(r.price) || 0;
  });

  const cap = daysN * 720; // 9:00гҖң21:00 = 12h/ж—Ҙ еҹәжә–
  function hrs(m) { return (Math.round(m / 6) / 10) + 'h'; }

  let html = '<div class="tabs">'
    + '<a class="' + (range === 'day' ? 'on' : '') + '" href="#/report?range=day&date=' + date + '">ж—Ҙ</a>'
    + '<a class="' + (range === 'week' ? 'on' : '') + '" href="#/report?range=week&date=' + date + '">йҖұ</a>'
    + '<a class="' + (range === 'month' ? 'on' : '') + '" href="#/report?range=month&date=' + date + '">жңҲ</a>'
    + '</div>';
  html += '<div class="selbar">'
    + '<button id="rpPrev">вҶҗ</button>'
    + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
    + '<button id="rpNext">вҶ’</button>'
    + '<span style="color:var(--sub)">е…Ё' + rows.length + 'д»¶</span>'
    + '</div>';

  if (!rows.length) {
    html += '<div class="empty">гҒ“гҒ®жңҹй–“гҒ®дәҲзҙ„гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
  } else {
    let tc = 0, td = 0, tm = 0, tr = 0, tk = 0;
    html += '<div class="tlwrap" style="padding:0"><table class="rep"><thead><tr>'
      + '<th>гӮ№гӮҝгғғгғ•</th><th>д»¶ж•°</th><th>вң“жёҲгҒҝ</th><th>рҹ“қгӮ«гғ«гғҶ</th><th>иЁҳе…ҘзҺҮ</th><th>зЁјеғҚ</th><th>еҹӢгҒҫгӮҠзҺҮ</th><th>еЈІдёҠ</th></tr></thead><tbody>';
    Object.keys(agg).sort().forEach(function(st) {
      const a = agg[st];
      tc += a.count; td += a.done; tm += a.mins; tr += a.rev; tk += a.kd;
      const rate = Math.round(a.mins / cap * 100);
      const krate = a.count ? Math.round(a.kd / a.count * 100) : 0;
      const kcolor = krate >= 100 ? 'var(--accent)' : (krate >= 80 ? '#b0743a' : '#b3261e');
      html += '<tr><td>' + esc(st) + '</td><td>' + a.count + '</td>'
        + '<td>' + a.done + '/' + a.count + '</td>'
        + '<td>' + a.kd + '/' + a.count + (krate >= 100 ? ' вң…' : '') + '</td>'
        + '<td style="color:' + kcolor + ';font-weight:700">' + krate + '%<div class="bar"><span style="width:' + Math.min(krate, 100) + '%;background:' + kcolor + '"></span></div></td>'
        + '<td>' + hrs(a.mins) + '</td>'
        + '<td>' + rate + '%<div class="bar"><span style="width:' + Math.min(rate, 100) + '%"></span></div></td>'
        + '<td>' + a.rev.toLocaleString('ja-JP') + 'еҶҶ</td></tr>';
    });
    const tkrate = tc ? Math.round(tk / tc * 100) : 0;
    html += '<tr class="tot"><td>еҗҲиЁҲ</td><td>' + tc + '</td><td>' + td + '/' + tc + '</td>'
      + '<td>' + tk + '/' + tc + '</td><td>' + tkrate + '%</td>'
      + '<td>' + hrs(tm) + '</td><td>-</td><td>' + tr.toLocaleString('ja-JP') + 'еҶҶ</td></tr>';
    html += '</tbody></table></div>';
    html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px">вҖ»рҹ“қгӮ«гғ«гғҶпјқжӢ…еҪ“гҒ—гҒҹгҒҠе®ўж§ҳгҒ®гҒҶгҒЎеҪ“ж—ҘгӮ«гғ«гғҶгӮ’жӣёгҒ‘гҒҹд»¶ж•°пјҲиЁҳе…ҘзҺҮгҒҜжҹ»е®ҡгҒ®еҸӮиҖғжҢҮжЁҷгҖӮжңҲиЎЁзӨәгҒ«гҒҷгӮӢгҒЁжңҲж¬ЎгҒ®йӣҶиЁҲгҒ«гҒӘгӮҠгҒҫгҒҷпјүгҖӮеҹӢгҒҫгӮҠзҺҮгҒҜе–¶жҘӯ12hГ—' + daysN + 'ж—Ҙеҹәжә–гҖӮеЈІдёҠгҒҜгғ¬гғғгӮ№гғіж–ҷгғҷгғјгӮ№пјҲжңҲи¬қгғ»еӣһж•°еҲёжү•гҒ„гҒҜ0еҶҶиЁҲдёҠпјү</div>';
  }

  html += '<div class="card" style="margin-top:12px"><h2>рҹ“қ гӮ«гғ«гғҶиЁҳе…Ҙ</h2>';
  const kNames = Object.keys(karteBy);
  if (!kNames.length) {
    html += '<div class="empty" style="padding:10px 0">гҒ“гҒ®жңҹй–“гҒ®гӮ«гғ«гғҶиЁҳе…ҘгҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“</div>';
  } else {
    kNames.sort().forEach(function(nm) {
      html += '<div class="hist"><span style="flex:1">' + esc(nm) + '</span><span>' + karteBy[nm] + 'д»¶</span></div>';
    });
  }
  html += '</div>';

  // гғ•гӮ©гғӯгғјеҜҫиұЎпјҲжңҹй–“гҒ«й–ўдҝӮгҒӘгҒҸзҸҫжҷӮзӮ№гҒ®е…ЁйЎ§е®ўгҒӢгӮүиҮӘеӢ•жҠҪеҮә = LTVеҜҫзӯ–гғӘгӮ№гғҲпјү
  const [statsAll, custAll] = await Promise.all([
    sb.from('crm_customer_stats').select('*').limit(2000),
    sb.from('crm_customers').select('merchant_id,customer_id,name,ticket_books').limit(2000),
  ]);
  const nameOf = {};
  (custAll.data || []).forEach(function(cu) { nameOf[custKey(cu.merchant_id, cu.customer_id)] = cu.name || ''; });

  const riskList = [];
  (statsAll.data || []).forEach(function(st) {
    if (st.next_visit || !st.last_visit) return;
    const gap = daysBetween(st.last_visit, Date.now());
    const threshold = Math.max(21, (st.avg_interval_days || 14) * 1.5);
    if (gap > threshold && gap <= 90 && st.past_visits >= 1) {
      riskList.push({ st: st, gap: gap, mild: (st.past_visits || 0) >= 15 });
    }
  });
  // рҹ”ҙпјҲж–°гҒ—гӮҒгҒ®гҒҠе®ўж§ҳпјүгӮ’е…ҲгҒ«гҖҒрҹҹЎпјҲй•·жңҹгҒ®гҒҠе®ўж§ҳпјқгӮҶгӮӢгӮ„гҒӢеҜҫеҝңпјүгӮ’еҫҢгҒ«
  riskList.sort(function(a, b) { return (a.mild ? 1 : 0) - (b.mild ? 1 : 0) || a.gap - b.gap; });

  const ticketList = [];
  (custAll.data || []).forEach(function(cu) {
    const al = ticketAlerts(cu.ticket_books);
    if (al.length) ticketList.push({ cu: cu, text: al[0].text });
  });

  html += '<div class="card" style="margin-top:12px"><h2>рҹ”ҙ гғ•гӮ©гғӯгғјеҜҫиұЎпјҲиҮӘеӢ•жҠҪеҮәгғ»зҸҫжҷӮзӮ№пјү</h2>';
  html += '<h3>йӣўи„ұжіЁж„ҸпјҲж¬ЎеӣһдәҲзҙ„гҒӘгҒ—гғ»жқҘеә—гғҡгғјгӮ№и¶…йҒҺпјүгҖҖ<small style="color:var(--sub);font-weight:400">рҹ”ҙ=е„Әе…Ҳгғ•гӮ©гғӯгғјпјҸрҹҹЎ=й•·жңҹгҒ®гҒҠе®ўж§ҳпјҲ15еӣһд»ҘдёҠпјүгҒҜгӮҶгӮӢгӮ„гҒӢгҒ«ж§ҳеӯҗиҰӢ</small></h3>';
  if (!riskList.length) html += '<div class="empty" style="padding:8px 0">зҸҫеңЁи©ІеҪ“гҒӘгҒ— рҹҺү</div>';
  riskList.slice(0, 15).forEach(function(x) {
    const k = custKey(x.st.merchant_id, x.st.customer_id);
    html += '<div class="hist"><span>' + (x.mild ? 'рҹҹЎ' : 'рҹ”ҙ') + '</span>'
      + '<a style="flex:1;color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.st.merchant_id) + '/' + x.st.customer_id + '">' + esc(nameOf[k] || 'пјҲеҗҚеүҚдёҚжҳҺпјү') + '</a>'
      + '<span>еүҚеӣһгҒӢгӮү' + x.gap + 'ж—Ҙ</span><span style="color:var(--sub)">жқҘеә—' + x.st.past_visits + 'еӣһ</span></div>';
  });
  if (riskList.length > 15) html += '<div style="color:var(--sub);font-size:12px">вҖҰгҒ»гҒӢ' + (riskList.length - 15) + 'еҗҚ</div>';

  html += '<h3>еӣһж•°еҲёгҒ®жЎҲеҶ…гҒ©гҒҚпјҲж®ӢгӮҠгӮҸгҒҡгҒӢгғ»жңҹйҷҗй–“иҝ‘пјү</h3>';
  if (!ticketList.length) html += '<div class="empty" style="padding:8px 0">зҸҫеңЁи©ІеҪ“гҒӘгҒ—</div>';
  ticketList.slice(0, 15).forEach(function(x) {
    html += '<div class="hist"><a style="flex:1;color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.cu.merchant_id) + '/' + x.cu.customer_id + '">' + esc(x.cu.name || '') + '</a>'
      + '<span>' + esc(x.text) + '</span></div>';
  });
  html += '</div>';

  app.innerHTML = html;
  document.getElementById('rpPrev').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + prevD; };
  document.getElementById('rpNext').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + nextD; };
}

// в”Җв”Җ жңҲи¬қз®ЎзҗҶпјҲжңҲNеӣһгӮігғјгӮ№гҒ®дәҲзҙ„ж¶ҲеҢ–гғҒгӮ§гғғгӮҜпјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function subQuota(subs) {
  // жңүеҠ№гҒӘжңҲи¬қгҒӢгӮүгҖҢжңҲNеӣһгҖҚгҒ®еҗҲиЁҲгӮ’иӘӯгҒҝеҸ–гӮӢпјҲе…Ёи§’ж•°еӯ—еҜҫеҝңпјү
  let n = 0;
  (subs || []).forEach(function(s) {
    if (s.contract_status !== 'active') return;
    const normalized = String(s.product_name || '').replace(/[пјҗ-пјҷ]/g, function(c) {
      return String.fromCharCode(c.charCodeAt(0) - 65248);
    });
    const m = normalized.match(/(\d+)\s*еӣһ/);
    if (m) n += parseInt(m[1], 10);
  });
  return n;
}
function subMonthStatus(booked, N, daysLeft) {
  if (booked >= N) return { s: 0, icon: 'рҹҹў', text: 'е…Ё' + N + 'еӣһдәҲзҙ„жёҲгҒҝ' };
  if (booked === 0) return { s: 3, icon: 'рҹ”ҙ', text: 'дәҲзҙ„гӮјгғӯпјҲжңҲ' + N + 'еӣһпјү' };
  const need = N - booked;
  const weeksLeft = daysLeft / 7;
  if (need > weeksLeft * 2) return { s: 3, icon: 'рҹ”ҙ', text: 'гҒӮгҒЁ' + need + 'еӣһгғ»ж¶ҲеҢ–еӣ°йӣЈ' };
  if (need > weeksLeft) return { s: 2, icon: 'рҹҹЎ', text: 'гҒӮгҒЁ' + need + 'еӣһгғ»иҰҒдҝғгҒ—' };
  return { s: 1, icon: 'рҹҹ ', text: 'гҒӮгҒЁ' + need + 'еӣһжңӘдәҲзҙ„' };
}
function subNextStatus(booked, N, day) {
  if (day < 10) return { s: 0, icon: 'вҸі', text: '10ж—Ҙй–Ӣж”ҫеҫҢгҒ«еҲӨе®ҡ' };
  if (booked >= N) return { s: 0, icon: 'рҹҹў', text: 'е…Ё' + N + 'еӣһдәҲзҙ„жёҲгҒҝ' };
  if (booked === 0) return { s: 3, icon: 'рҹ”ҙ', text: 'дәҲзҙ„гӮјгғӯ' };
  return { s: 2, icon: 'рҹҹЎ', text: 'гҒӮгҒЁ' + (N - booked) + 'еӣһжңӘдәҲзҙ„' };
}
async function renderSubs(params) {
  const storeSel = (params && params.get('store')) || '';
  app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝдёӯвҖҰ</div>';
  const today = jstToday();
  const ym = today.slice(0, 7);
  const y = parseInt(ym.slice(0, 5), 10), mo = parseInt(ym.slice(5, 7), 10);
  const dim = new Date(y, mo, 0).getDate();
  const day = parseInt(today.slice(8, 10), 10);
  const first = ym + '-01';
  const nextFirst = addDays(ym + '-' + String(dim).padStart(2, '0'), 1);
  const nextYm = nextFirst.slice(0, 7);
  const ny = parseInt(nextYm.slice(0, 5), 10), nmo = parseInt(nextYm.slice(5, 7), 10);
  const nextDim = new Date(ny, nmo, 0).getDate();
  const afterNextFirst = addDays(nextYm + '-' + String(nextDim).padStart(2, '0'), 1);
  const nowIso = new Date().toISOString();

  const [custQ, resQ] = await Promise.all([
    sb.from('crm_customers').select('merchant_id,customer_id,name,merchant_name,subscriptions').limit(2000),
    fetchRange(first, afterNextFirst),
  ]);
  if (custQ.error || resQ.error) { app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј</div>'; return; }

  // йЎ§е®ўгҒ”гҒЁгҒ«еҪ“жңҲгғ»зҝҢжңҲгҒ®дәҲзҙ„ж•°гҒЁеҪ“жңҲж¶ҲеҢ–ж•°гӮ’ж•°гҒҲгӮӢ
  const cnt = {};
  (resQ.data || []).forEach(function(r) {
    if (!r.customer_id) return;
    const k = custKey(r.merchant_id, r.customer_id);
    const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
    const c = (cnt[k] = cnt[k] || { thisB: 0, thisV: 0, nextB: 0 });
    if (d.slice(0, 7) === ym) {
      c.thisB++;
      if (r.booking_start < nowIso) c.thisV++;
    } else if (d.slice(0, 7) === nextYm) {
      c.nextB++;
    }
  });

  const list = [];
  const storeSet = {};
  (custQ.data || []).forEach(function(cu) {
    const N = subQuota(cu.subscriptions);
    if (!N) return;
    const stTag = ((cu.merchant_name || '').split(/[\sгҖҖ]/).pop()) || 'еә—иҲ—дёҚжҳҺ';
    storeSet[stTag] = true;
    if (storeSel && stTag !== storeSel) return;
    const k = custKey(cu.merchant_id, cu.customer_id);
    const c = cnt[k] || { thisB: 0, thisV: 0, nextB: 0 };
    const stThis = subMonthStatus(c.thisB, N, dim - day + 1);
    // йҖұ2гғҡгғјгӮ№гҒҢеҝ…иҰҒгҒӘгӮігғјгӮ№пјҲжңҲ6еӣһд»ҘдёҠпјүгҒҜж¶ҲеҢ–гҒ®йҒ…гӮҢгӮӮиӯҰе‘Ҡ
    if (N >= 6) {
      const expected = Math.round(N * day / dim);
      if (c.thisV < expected - 1) {
        stThis.text += 'гғ»ж¶ҲеҢ–' + c.thisV + 'еӣһпјҲзӣ®е®ү' + expected + 'еӣһпјү';
        if (stThis.s < 2) { stThis.s = 2; stThis.icon = 'рҹҹЎ'; }
      }
    }
    const stNext = subNextStatus(c.nextB, N, day);
    list.push({ cu: cu, N: N, c: c, stThis: stThis, stNext: stNext, sev: Math.max(stThis.s, stNext.s), stTag: stTag });
  });
  // еә—иҲ—гҒ”гҒЁгҒ«гҒҫгҒЁгӮҒгҒҰиЎЁзӨәпјҲеҗ„еә—иҲ—гҒ§гҒ®гғҒгӮ§гғғгӮҜйҒӢз”ЁгҒ«еҜҫеҝңпјүвҶ’ еә—иҲ—еҶ…гҒҜиҰҒеҜҫеҝңй Ҷ
  list.sort(function(a, b) {
    return a.stTag.localeCompare(b.stTag) || b.sev - a.sev || b.stThis.s - a.stThis.s || (a.cu.name || '').localeCompare(b.cu.name || '');
  });

  const nRed = list.filter(function(x) { return x.sev >= 3; }).length;
  const nYel = list.filter(function(x) { return x.sev === 2 || x.sev === 1; }).length;
  const nGrn = list.filter(function(x) { return x.sev === 0; }).length;

  let html = '<h2>жңҲи¬қгӮігғјгӮ№гҒ®дәҲзҙ„ж¶ҲеҢ–пјҲ' + mo + 'жңҲгғ»дјҡе“Ў' + list.length + 'еҗҚ' + (storeSel ? 'гғ»' + esc(storeSel) : '') + 'пјү</h2>';
  // еә—иҲ—гғ•гӮЈгғ«гӮҝ
  html += '<div class="chips"><a class="' + (storeSel ? '' : 'on') + '" href="#/subs">е…Ёеә—</a>';
  Object.keys(storeSet).sort().forEach(function(stTag) {
    html += '<a class="' + (storeSel === stTag ? 'on' : '') + '" href="#/subs?store=' + encodeURIComponent(stTag) + '">' + esc(stTag) + '</a>';
  });
  html += '</div>';
  html += '<div class="chips">'
    + '<a style="pointer-events:none;background:#b3261e;border-color:#b3261e;color:#fff">рҹ”ҙ иҰҒеҜҫеҝң ' + nRed + 'еҗҚ</a>'
    + '<a style="pointer-events:none">рҹҹЎрҹҹ  жіЁж„Ҹ ' + nYel + 'еҗҚ</a>'
    + '<a style="pointer-events:none">рҹҹў OK ' + nGrn + 'еҗҚ</a>'
    + '</div>';
  html += '<div style="color:var(--sub);font-size:12px;margin-bottom:8px">еҪ“жңҲпјқд»ҠжңҲдёӯгҒ®дәҲзҙ„зҠ¶жіҒпјҲж¶ҲеҢ–жёҲгҒҝеҗ«гӮҖпјүпјҸзҝҢжңҲпјқжҜҺжңҲ10ж—ҘгҒ®дәҲзҙ„й–Ӣж”ҫеҫҢгҒ«гғҒгӮ§гғғгӮҜгҖӮ15ж—Ҙй ғгҒ®зўәиӘҚгҒҢгҒҠгҒҷгҒҷгӮҒгҒ§гҒҷ</div>';

  html += '<div class="tlwrap" style="padding:0"><table class="rep"><thead><tr>'
    + '<th>гҒҠе®ўж§ҳ</th><th>гӮігғјгӮ№</th><th>еҪ“жңҲпјҲж¶ҲеҢ–/дәҲзҙ„/жһ пјү</th><th>зҝҢжңҲ' + nmo + 'жңҲпјҲдәҲзҙ„/жһ пјү</th></tr></thead><tbody>';
  let curStore = '';
  list.forEach(function(x) {
    if (x.stTag !== curStore) {
      curStore = x.stTag;
      const inStore = list.filter(function(y) { return y.stTag === curStore; });
      const r = inStore.filter(function(y) { return y.sev >= 3; }).length;
      const yl = inStore.filter(function(y) { return y.sev === 2 || y.sev === 1; }).length;
      const g = inStore.filter(function(y) { return y.sev === 0; }).length;
      html += '<tr><td colspan="4" style="text-align:left;background:#d8e2dc;font-weight:800;font-size:13.5px">'
        + 'рҹҸ¬ ' + esc(curStore) + 'гҖҖдјҡе“Ў' + inStore.length + 'еҗҚпјҲрҹ”ҙ' + r + 'гғ»рҹҹЎ' + yl + 'гғ»рҹҹў' + g + 'пјү</td></tr>';
    }
    html += '<tr>'
      + '<td><a style="color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.cu.merchant_id) + '/' + x.cu.customer_id + '">' + esc(x.cu.name || '') + '</a></td>'
      + '<td>жңҲ' + x.N + 'еӣһ</td>'
      + '<td style="text-align:left">' + x.stThis.icon + ' ' + x.c.thisV + '/' + x.c.thisB + '/' + x.N + 'гҖҖ' + esc(x.stThis.text) + '</td>'
      + '<td style="text-align:left">' + x.stNext.icon + ' ' + x.c.nextB + '/' + x.N + 'гҖҖ' + esc(x.stNext.text) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  app.innerHTML = html;
}

// в”Җв”Җ дҪ“йЁ“гғ»еҲқеӣһгғ¬гғғгӮ№гғідәҲзҙ„пјҲеәғе‘Ҡгғ»LгӮ№гғҶгғғгғ—гҒ®жөҒе…ҘжҢҮжЁҷпјү в”Җв”Җв”Җв”Җв”Җ
async function renderTrial() {
  app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝдёӯвҖҰ</div>';
  const today = jstToday();
  const from = addDays(today, -120);
  const to = addDays(today, 92);
  const { data, error } = await sb.from('crm_reservations').select('*')
    .gte('booking_start', from + 'T00:00:00+09:00').lt('booking_start', to + 'T00:00:00+09:00')
    .eq('status', 'accepted')
    .or('menu.ilike.%еҲқеӣһ%,menu.ilike.%дҪ“йЁ“%,menu.ilike.%гӮӯгғЈгғігғҡгғјгғі%,menu.ilike.%гҒӢгӮ“гҒ–гҒ—%')
    .order('booking_start', { ascending: false }).limit(500);
  if (error) { app.innerHTML = '<div class="empty">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј: ' + esc(error.message) + '</div>'; return; }
  const rows = data || [];
  function isPortal(r) { return (r.menu || '').indexOf('гҒӢгӮ“гҒ–гҒ—') >= 0; }
  const nowIso = new Date().toISOString();
  const ym = today.slice(0, 7);
  const lastYm = addDays(ym + '-01', -1).slice(0, 7);
  const wkStart = weekStart(today);
  const wkEnd = addDays(wkStart, 7);
  function dOf(r) { return new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start)); }

  // д»ҠжңҲ/е…ҲжңҲ/д»ҠйҖұ/гҒ“гӮҢгҒӢгӮү/гҒӢгӮ“гҒ–гҒ—гҒ®гғҒгғғгғ—пјҲsubsetеҚҳдҪҚгҒ§дҪҝгҒ„еӣһгҒ—пјү
  function statChips(subset, big) {
    const c = subset.filter(function(r) { return !isPortal(r); });
    const tm = c.filter(function(r) { return dOf(r).slice(0, 7) === ym; }).length;
    const lm = c.filter(function(r) { return dOf(r).slice(0, 7) === lastYm; }).length;
    const wk = c.filter(function(r) { const d = dOf(r); return d >= wkStart && d < wkEnd; }).length;
    const fu = c.filter(function(r) { return r.booking_start >= nowIso; }).length;
    const po = subset.filter(function(r) { return isPortal(r) && dOf(r).slice(0, 7) === ym; }).length;
    return '<div class="chips"' + (big ? '' : ' style="margin:4px 0 6px"') + '>'
      + '<a style="pointer-events:none">д»ҠжңҲ ' + tm + 'д»¶</a>'
      + '<a style="pointer-events:none">е…ҲжңҲ ' + lm + 'д»¶</a>'
      + '<a style="pointer-events:none">д»ҠйҖұ ' + wk + 'д»¶</a>'
      + '<a style="pointer-events:none;background:var(--accent);color:#fff">рҹҶ• гҒ“гӮҢгҒӢгӮү ' + fu + 'д»¶</a>'
      + (po ? '<a style="pointer-events:none">рҹ”– гҒӢгӮ“гҒ–гҒ— д»ҠжңҲ' + po + 'д»¶</a>' : '')
      + '</div>';
  }
  function listHtml(subset) {
    let out = '<div class="card">';
    let curYm2 = '';
    subset.forEach(function(r) {
      const d = dOf(r);
      if (d.slice(0, 7) !== curYm2) {
        curYm2 = d.slice(0, 7);
        const mc = subset.filter(function(x) { return dOf(x).slice(0, 7) === curYm2; }).length;
        out += '<div class="mhead">' + parseInt(curYm2.slice(0, 5), 10) + 'е№ҙ' + parseInt(curYm2.slice(5, 7), 10) + 'жңҲгҖҖ' + mc + 'д»¶</div>';
      }
      const future = r.booking_start >= nowIso;
      out += '<div class="hist">'
        + '<span class="d' + (future ? ' future' : '') + '">' + fmtDate(r.booking_start) + '</span>'
        + '<span>' + fmtTime(r.booking_start) + '</span>'
        + '<a style="flex:1;color:var(--accent);text-decoration:none;font-weight:700" href="#/c/' + encodeURIComponent(r.merchant_id) + '/' + r.customer_id + '">' + esc(r.customer_name || 'пјҲеҗҚеүҚгҒӘгҒ—пјү') + '</a>'
        + '<span style="color:var(--sub)">' + esc((r.staff_names || []).join('гғ»')) + '</span>'
        + (isPortal(r) ? '<span class="pill" style="background:#f0e4d0">рҹ”– гҒӢгӮ“гҒ–гҒ—</span>' : '')
        + (future ? '<span class="pill">рҹҶ• дәҲе®ҡ</span>' : '<span class="pill" style="background:#dde6e0">жқҘеә—жёҲ</span>')
        + '</div>';
    });
    return out + '</div>';
  }

  let html = '<h2>рҹҺ« дҪ“йЁ“гғ»еҲқеӣһгғ¬гғғгӮ№гғідәҲзҙ„пјҲеәғе‘Ҡ/LгӮ№гғҶгғғгғ—жөҒе…ҘгҒ®жҢҮжЁҷпјү</h2>';
  html += '<div style="font-weight:700;margin:2px 2px 0;color:var(--sub);font-size:12px">е…Ёеә—иҲ—еҗҲиЁҲ</div>';
  html += statChips(rows, true);

  if (!rows.length) {
    html += '<div class="empty">еҜҫиұЎжңҹй–“гҒ«дҪ“йЁ“дәҲзҙ„гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
  } else {
    // еә—иҲ—гҒ”гҒЁгҒ®гӮ»гӮ°гғЎгғігғҲпјҲд»ҠжңҲгҒ®дҪ“йЁ“д»¶ж•°гҒҢеӨҡгҒ„й Ҷпјү
    const stores = {};
    rows.forEach(function(r) { const k = r.store_tag || 'еә—иҲ—дёҚжҳҺ'; (stores[k] = stores[k] || []).push(r); });
    const keys = Object.keys(stores).sort(function(a, b) {
      function tmOf(k) { return stores[k].filter(function(r) { return !isPortal(r) && dOf(r).slice(0, 7) === ym; }).length; }
      return (tmOf(b) - tmOf(a)) || (stores[b].length - stores[a].length) || a.localeCompare(b, 'ja');
    });
    keys.forEach(function(k) {
      html += '<div style="font-weight:800;font-size:15px;margin:16px 2px 0;padding:6px 10px;border-radius:10px;background:'
        + storeColor(k) + '">рҹҸ¬ ' + esc(k) + 'гҖҖиЁҲ' + stores[k].length + 'д»¶</div>';
      html += statChips(stores[k], false);
      html += listHtml(stores[k]);
    });
    html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px">дҪ“йЁ“гӮӯгғЈгғігғҡгғјгғіпјҲ12,000еҶҶвҶ’1,000еҶҶпјүпјӢгҒӢгӮ“гҒ–гҒ—зөҢз”ұпјҲрҹ”–пјүгҒ®зўәе®ҡдәҲзҙ„гӮ’еә—иҲ—еҲҘгҒ«иҮӘеӢ•жҠҪеҮәпјҲйҒҺеҺ»120ж—ҘгҖңд»ҠеҫҢ92ж—Ҙгғ»5еҲҶгҒ”гҒЁжӣҙж–°пјүгҖӮеҗҚеүҚгӮ’гӮҝгғғгғ—гҒҷгӮӢгҒЁйЎ§е®ўгғҡгғјгӮёпјҲйҖЈзөЎе…Ҳгғ»гӮ«гғ«гғҶпјүгҒё</div>';
  }
  app.innerHTML = html;
}


// в”Җв”Җ гғ«гғјгӮҝгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function render() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { renderLogin(); return; }
  topbar.hidden = false;

  const hash = location.hash || '#/';
  // йҒёжҠһдёӯгҒ®гғЎгғӢгғҘгғјгӮ’еј·иӘҝпјҲйЎ§е®ўгғҡгғјгӮёгҒҜгҖҢдәҲзҙ„гҖҚжүұгҒ„пјү
  Array.prototype.forEach.call(topbar.querySelectorAll('a'), function(a) {
    const href = a.getAttribute('href');
    let on;
    if (href === '#/') {
      on = hash === '#/' || hash.indexOf('#/?') === 0 || hash.indexOf('#/c/') === 0;
    } else {
      on = hash.indexOf(href) === 0;
    }
    a.classList.toggle('on', on);
  });
  const m = hash.match(/^#\/c\/([^/]+)\/(\d+)/);
  if (m) { renderCustomer(decodeURIComponent(m[1]), m[2]); return; }
  if (hash.indexOf('#/tl') === 0) {
    renderTimeline(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/report') === 0) {
    renderReport(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/trial') === 0) { renderTrial(); return; }
  if (hash.indexOf('#/subs') === 0) {
    renderSubs(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/search') === 0) {
    const q = new URLSearchParams(hash.split('?')[1] || '').get('q') || '';
    renderSearch(q); return;
  }
  const dateQ = new URLSearchParams(hash.split('?')[1] || '').get('date') || '';
  renderDay(dateQ);
}
window.addEventListener('hashchange', render);
render();
</script>
