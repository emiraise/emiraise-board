<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>エミライズ 顧客ボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --accent:#1f6f54; --accent-d:#12463a; --bg:#f2f5f3; --card:#fff; --line:#e1e7e3; --text:#182722; --sub:#68796f; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  header[hidden] { display:none; }
  header { position:sticky; top:0; z-index:10; background:linear-gradient(120deg, var(--accent-d), var(--accent)); color:#fff; padding:10px 14px; display:flex; align-items:center; gap:8px; box-shadow:0 2px 10px rgba(18,70,58,.25); }
  header .brand { font-weight:700; font-size:15px; margin-right:auto; }
  header button, header a { background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:8px; padding:7px 12px; font-size:13px; text-decoration:none; cursor:pointer; }
  header a.on { background:#fff; color:var(--accent); font-weight:700; }
  main { max-width:none; margin:0 auto; padding:14px 18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 1px 5px rgba(20,45,35,.05); }
  h2 { font-size:16px; margin:6px 2px 10px; }
  h3 { font-size:13px; color:var(--sub); margin:14px 2px 6px; text-transform:none; }
  .daynav { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .daynav button { border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-size:14px; cursor:pointer; }
  .daynav input { border:1px solid var(--line); border-radius:10px; padding:8px; font-size:14px; flex:1; }
  .staff-head { display:flex; align-items:center; gap:8px; margin:16px 2px 6px; font-weight:700; font-size:14px; }
  .staff-head .cnt { color:var(--sub); font-weight:400; font-size:12px; }
  .row { display:flex; align-items:center; gap:10px; padding:12px 14px; background:#fff; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; text-decoration:none; color:inherit; }
  .row:active { background:#f0f4f2; }
  .time { font-weight:700; font-variant-numeric:tabular-nums; min-width:46px; }
  .cust { font-weight:600; flex:1; }
  .menu { color:var(--sub); font-size:12px; max-width:34%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge { color:#fff; font-size:11px; border-radius:999px; padding:3px 8px; white-space:nowrap; }
  .empty { color:var(--sub); text-align:center; padding:30px 0; }
  .kv { display:grid; grid-template-columns:88px 1fr; gap:6px 10px; font-size:14px; }
  .kv dt { color:var(--sub); } .kv dd { margin:0; word-break:break-all; }
  .pill { display:inline-block; background:#eef3f1; border-radius:999px; padding:4px 10px; font-size:12px; margin:2px 4px 2px 0; }
  .pill.warn { background:#fdecec; color:#b3261e; }
  .pill.mild { background:#fbf3d9; color:#8a6d1a; }
  .hist { display:flex; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:13px; align-items:baseline; }
  .hist:last-child { border-bottom:none; }
  .hist .d { min-width:104px; font-variant-numeric:tabular-nums; }
  .hist .future { color:var(--accent); font-weight:700; }
  .hist .seq { min-width:44px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }
  .mhead { font-weight:800; font-size:13px; margin:12px 0 4px; padding:6px 10px; border-radius:10px; background:#dde6e0; color:#26443a; }
  .mhead.warn { background:#f4dede; color:#b3261e; }
  .note { border-bottom:1px solid var(--line); padding:10px 2px; }
  .note:last-child { border-bottom:none; }
  .note .meta { font-size:11px; color:var(--sub); margin-bottom:3px; }
  textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:14px; min-height:74px; font-family:inherit; }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:10px 18px; font-size:14px; cursor:pointer; }
  .btn[disabled] { opacity:.5; }
  .login-wrap { max-width:360px; margin:12vh auto 0; padding:0 16px; }
  .login-wrap input { width:100%; border:1px solid var(--line); border-radius:10px; padding:12px; font-size:15px; margin-bottom:10px; }
  .login-wrap .btn { width:100%; padding:12px; }
  .err { color:#b3261e; font-size:13px; margin:8px 0; }
  .searchbar { display:flex; gap:8px; margin-bottom:12px; }
  .searchbar input { flex:1; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:15px; }
  .back { display:inline-block; margin-bottom:10px; color:var(--accent); text-decoration:none; font-size:14px; }
  .qa { font-size:13px; padding:6px 2px; border-bottom:1px dashed var(--line); }
  .qa:last-child { border-bottom:none; }
  .qa .q { color:var(--sub); }
  /* ── タイムライン（日/週/月） ── */
  .tabs { display:flex; gap:6px; margin-bottom:10px; }
  .tabs a { padding:7px 14px; border:1px solid var(--line); border-radius:999px; background:#fff; text-decoration:none; color:inherit; font-size:13px; }
  .tabs a.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chips a { padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:#fff; text-decoration:none; color:inherit; font-size:12px; }
  .chips a.on { background:#1f2d2a; color:#fff; border-color:#1f2d2a; }
  .selbar { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  .selbar select, .selbar button, .selbar input { border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px; background:#fff; }
  .tlwrap { overflow-x:auto; background:#fff; border:1px solid var(--line); border-radius:12px; padding:4px 0 8px; }
  .tl { min-width:1000px; position:relative; }
  .tlhead { display:flex; height:22px; }
  .tlrow { display:flex; align-items:stretch; border-top:1px solid var(--line); }
  .tlname { flex:0 0 98px; position:sticky; left:0; background:#fff; z-index:2; font-size:13px; font-weight:700; padding:10px 6px 0; border-right:1px solid var(--line); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tlname.me { color:var(--accent); }
  .shtag { font-size:10px; font-weight:400; color:var(--sub); margin-top:2px; white-space:normal; line-height:1.3; }
  .shtag.off { color:#b3261e; }
  .shtag.oth { color:#5a67a5; }
  .shoff { position:absolute; top:0; bottom:0; z-index:0; background:repeating-linear-gradient(45deg, #efece6 0 8px, #e7e3da 8px 16px); color:#8a8375; font-size:11px; padding:4px 6px; overflow:hidden; white-space:nowrap; }
  .shoff.oth { background:repeating-linear-gradient(45deg, #e8ebf5 0 8px, #dfe3f2 8px 16px); color:#5a67a5; }
  .shoff.offday { display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; letter-spacing:.2em; color:#b3261e;
    background:repeating-linear-gradient(45deg, #f8e7e7 0 10px, #f3dbdb 10px 20px); }
  .chips a.offchip { background:#fdecec; border-color:#f0c9c9; color:#b3261e; pointer-events:none; }
  .tlday { padding:6px 10px; background:#e7eeeb; font-weight:700; font-size:12.5px; border-top:2px solid #cdd6d2; position:sticky; left:0; }
  .tltrack { position:relative; flex:1; height:88px; background-image:repeating-linear-gradient(to right, var(--line) 0 1px, transparent 1px 8%); }
  .tlhead .tltrack { height:22px; background:none; }
  .tlhour { position:absolute; top:4px; font-size:10px; color:var(--sub); padding-left:3px; }
  .tlblock { position:absolute; top:5px; height:78px; border-radius:8px; color:#fff; font-size:12px; line-height:1.3; padding:5px 7px; overflow:hidden; text-decoration:none; min-width:24px; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .tlblock .tlb-n { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tlblock .tlb-t { font-size:10.5px; opacity:.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mgrid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .mwd { text-align:center; font-size:11px; color:var(--sub); padding:2px 0; }
  .mcell { display:block; background:#fff; border:1px solid var(--line); border-radius:8px; min-height:74px; padding:4px; font-size:10.5px; overflow:hidden; text-decoration:none; color:inherit; }
  .mcell .dnum { font-weight:700; font-size:12px; margin-bottom:2px; }
  .mcell .mi { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--accent); font-weight:600; }
  .mcell .more { color:var(--sub); }
  .mcell.today { border:2px solid var(--accent); }
  .mcell.blank { background:transparent; border:none; }
  .tlblock { z-index:1; }
  .tbblk { position:absolute; top:2px; bottom:2px; z-index:0; border-radius:4px; color:#6b6357; font-size:10px; padding:1px 4px; cursor:pointer; overflow:hidden; white-space:nowrap;
    background:repeating-linear-gradient(45deg, #d8d2c6 0 6px, #cdc6b8 6px 12px); }
  .tbblk.mv { background:repeating-linear-gradient(45deg, #f6e2b3 0 6px, #f0d698 6px 12px); color:#805e12; border:1px dashed #d8b458; }
  .tlwrap { box-shadow:0 1px 5px rgba(20,45,35,.05); }
  .tlrow:nth-child(even) .tltrack { background-color:#fafcfa; }
  .row { box-shadow:0 1px 3px rgba(20,45,35,.04); }
  .btn { background:linear-gradient(120deg, var(--accent), #2c8a6a); box-shadow:0 1px 4px rgba(18,70,58,.25); }
  .listcols { columns: 3 340px; column-gap:12px; }
  .listcols .grp { break-inside:avoid; margin-bottom:8px; }
  .listcols .row { padding:7px 9px; border-radius:10px; gap:8px; }
  .listcols .rowwrap { margin-bottom:5px; gap:5px; }
  .listcols .time { min-width:40px; font-size:13px; }
  .listcols .cust { font-size:13.5px; }
  .listcols .menu { font-size:11px; }
  .listcols .ck { width:34px; flex:0 0 34px; font-size:14px; border-radius:10px; }
  .listcols .staff-head { margin:8px 2px 5px; }
  .tlname.sat { color:#3a6ea5; }
  .tlname.sun { color:#b3261e; }
  .tbform { display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:13px; }
  .tbform select, .tbform input { border:1px solid var(--line); border-radius:8px; padding:7px; font-size:13px; background:#fff; }
  .pcols { columns: 2 460px; column-gap:12px; }
  .pcols .card { break-inside: avoid; }
  /* 顧客ページ: 左=基本情報→予約履歴 / 右=カルテ→申し送り→ラベル→気づき（見落とし防止の並び） */
  .pgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:start;
    grid-template-areas:"basic ka" "basic ho" "hist lb" "hist ex"; }
  .c-basic { grid-area:basic; } .c-ka { grid-area:ka; } .c-ho { grid-area:ho; }
  .c-hist { grid-area:hist; } .c-lb { grid-area:lb; } .c-ex { grid-area:ex; }
  @media (max-width: 900px) { .pgrid { grid-template-columns:1fr; grid-template-areas:"basic" "ka" "ho" "hist" "lb" "ex"; } }
  /* 左右独立の縦積み2カラム（行揃えの隙間が出ない） */
  .pgrid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 12px; align-items:start; }
  .pgrid2 .pcol { min-width:0; }
  @media (max-width: 900px) { .pgrid2 { grid-template-columns:1fr; } }
  .tagbtn { padding:6px 12px; border:1px solid var(--line); border-radius:999px; background:#fff; font-size:12px; cursor:pointer; margin:0 6px 6px 0; }
  .tagbtn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tagbtn.warn.on { background:#b3261e; border-color:#b3261e; }
  .alertrow { display:flex; flex-wrap:wrap; gap:4px; margin:6px 0 2px; }
  .nx { color:#8a5aa5; font-size:12px; font-weight:600; }
  .rowwrap { display:flex; gap:6px; align-items:stretch; margin-bottom:8px; }
  .ck { width:42px; border-radius:12px; border:1px solid var(--line); background:#fff; color:#c5cfcb; font-size:17px; cursor:pointer; flex:0 0 42px; }
  .ck.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .mic { border:1px solid var(--line); background:#fff; border-radius:10px; padding:9px 14px; font-size:14px; cursor:pointer; }
  .mic.rec { background:#b3261e; color:#fff; border-color:#b3261e; }
  .rep { width:100%; border-collapse:collapse; font-size:13px; background:#fff; }
  .rep th, .rep td { border:1px solid var(--line); padding:8px 6px; text-align:right; white-space:nowrap; }
  .rep th:first-child, .rep td:first-child { text-align:left; position:sticky; left:0; background:#fff; }
  .rep thead th { background:#eef3f1; text-align:center; }
  .rep .tot td { font-weight:700; background:#fafcfb; }
  .bar { height:6px; background:#e8eeec; border-radius:4px; overflow:hidden; margin-top:3px; }
  .bar span { display:block; height:100%; background:var(--accent); }
  .tbblk.calb { background:repeating-linear-gradient(45deg, #dfe6f4 0 6px, #d4ddf1 6px 12px); color:#40518a; border:none; cursor:default; font-weight:600; }
  .avslot { position:absolute; top:3px; bottom:3px; z-index:0; background:rgba(46,160,110,.14); border:1.5px dashed #2ea06e; border-radius:8px; color:#1f6f54; font-size:10px; font-weight:800; padding:1px 4px; overflow:hidden; }

  /* ── ニューモーフィズムUI（機能そのまま・見た目の上書き） ── */
  :root { --bg:#e8ede9; --card:#e8ede9; --line:#d6ded9; --sd:#c5cfc8; --sl:#ffffff; }
  body { background:var(--bg); }
  header { background:var(--bg); color:var(--accent-d); box-shadow:0 4px 14px rgba(140,155,147,.35); }
  header .brand { color:var(--accent-d); }
  header a, header button { background:var(--bg); color:#41504a; box-shadow:3px 3px 7px var(--sd), -3px -3px 7px var(--sl); border-radius:12px; }
  header a.on { box-shadow:inset 3px 3px 6px var(--sd), inset -3px -3px 6px var(--sl); color:var(--accent); font-weight:800; background:var(--bg); }
  header a.brand, header a.brand.on { background:none; box-shadow:none; padding:0; border-radius:0; color:var(--accent-d); font-weight:700; font-size:15px; margin-right:auto; text-decoration:none; cursor:pointer; }
  .card { background:var(--card); border:none; box-shadow:7px 7px 16px var(--sd), -7px -7px 16px var(--sl); }
  .row { background:var(--bg); border:none; box-shadow:4px 4px 10px var(--sd), -4px -4px 10px var(--sl); }
  .rowwrap .ck { background:var(--bg); border:none; box-shadow:3px 3px 7px var(--sd), -3px -3px 7px var(--sl); }
  .rowwrap .ck.on { background:var(--accent); color:#fff; box-shadow:inset 3px 3px 6px rgba(12,60,45,.45); }
  .tlwrap { background:var(--bg); border:none; box-shadow:inset 4px 4px 10px var(--sd), inset -4px -4px 10px var(--sl); border-radius:16px; }
  .tlname { background:var(--bg); }
  .tlrow:nth-child(even) .tltrack { background-color:transparent; }
  .rep, .rep th:first-child, .rep td:first-child { background:var(--bg); }
  .rep thead th { background:#dde5df; }
  .rep .tot td { background:#dde5df; }
  input, select, textarea { background:var(--bg); border:none !important; box-shadow:inset 3px 3px 6px var(--sd), inset -3px -3px 6px var(--sl); border-radius:12px; outline:none; }
  .daynav button, .selbar button, .tabs a, .chips a, .tagbtn, .mic, .searchbar .btn { background:var(--bg); border:none; box-shadow:3px 3px 7px var(--sd), -3px -3px 7px var(--sl); }
  .tabs a.on, .chips a.on { background:var(--bg); color:var(--accent); font-weight:800; border:none; box-shadow:inset 3px 3px 6px var(--sd), inset -3px -3px 6px var(--sl); }
  .tagbtn.on { background:var(--accent); color:#fff; box-shadow:inset 3px 3px 6px rgba(12,60,45,.45); }
  .tagbtn.warn.on { background:#b3261e; box-shadow:inset 3px 3px 6px rgba(90,15,10,.45); }
  .chips a.offchip { background:var(--bg); color:#b3261e; box-shadow:inset 2px 2px 5px var(--sd), inset -2px -2px 5px var(--sl); }
  .btn { background:linear-gradient(120deg, var(--accent), #2c8a6a); box-shadow:4px 4px 10px var(--sd), -4px -4px 10px var(--sl); border:none; }
  .btn:active, .daynav button:active, .selbar button:active, .mic:active { box-shadow:inset 3px 3px 6px var(--sd), inset -3px -3px 6px var(--sl); }
  .mic.rec { background:#b3261e; color:#fff; box-shadow:inset 3px 3px 6px rgba(90,15,10,.45); }
  .staff-head { color:#33423b; }
  .login-wrap .card { box-shadow:9px 9px 20px var(--sd), -9px -9px 20px var(--sl); }
  .bar { background:#d9e1db; box-shadow:inset 1px 1px 3px var(--sd); }
  .note, .hist { border-color:var(--line); }
  .qa { border-color:var(--line); }
</style>
</head>
<body>
<header id="topbar" hidden>
  <a class="brand" href="#/">エミライズ 顧客ボード</a>
  <a href="#/">予約</a>
  <a href="#/tl">タイムライン</a>
  <a href="#/subs">月謝</a>
  <a href="#/report">日報</a>
  <a href="#/search">検索</a>
  <button id="pwBtn" title="パスワード変更">🔑</button>
  <button id="logoutBtn">ログアウト</button>
</header>
<main id="app"><div class="empty">読み込み中…</div></main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://bbhrcvhvzknsephftsbz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiaHJjdmh2emtuc2VwaGZ0c2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjk5NjEsImV4cCI6MjA5ODgwNTk2MX0.S40aeplTPHGQPdTsqi5krP7-UopEBLDsifx_8m4cD1I';
const sb = createClient(SB_URL, SB_KEY);

const app = document.getElementById('app');
const topbar = document.getElementById('topbar');
document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.hash = ''; render(); };
document.getElementById('pwBtn').onclick = async function() {
  const p = prompt('新しいパスワードを入力してください（8文字以上・自分だけが知るものに）');
  if (p === null) return;
  if (p.length < 8) { alert('8文字以上にしてください'); return; }
  const { error } = await sb.auth.updateUser({ password: p });
  alert(error ? '変更できませんでした: ' + error.message : 'パスワードを変更しました。次回からは新しいパスワードでログインしてください。');
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
const TZ = 'Asia/Tokyo';
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', timeZone:TZ });
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ja-JP', { year:'numeric', month:'numeric', day:'numeric', weekday:'short', timeZone:TZ });
}
function jstToday() {
  const p = new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(new Date());
  return p; // YYYY-MM-DD
}
function addDays(dstr, n) {
  const d = new Date(dstr + 'T00:00:00+09:00');
  d.setUTCDate(d.getUTCDate() + n);
  return new Intl.DateTimeFormat('sv-SE', { timeZone:TZ }).format(d);
}
const STORE_COLORS = ['#2f6f5f', '#5a67a5', '#b0743a', '#8a5aa5', '#3a7fb0'];
function storeColor(tag) {
  let h = 0; const s = String(tag || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return STORE_COLORS[h % STORE_COLORS.length];
}
function qaItems(arr) {
  // profile_fields / questionnaires から {question, answer} を汎用に取り出す
  const out = [];
  function walk(x) {
    if (!x) return;
    if (Array.isArray(x)) { x.forEach(walk); return; }
    if (typeof x === 'object') {
      if (x.question) {
        out.push({ q: x.question, a: (x.answer != null ? x.answer : (x.answers || '')) });
      }
      Object.keys(x).forEach(function(k) { if (k !== 'question' && k !== 'answer') walk(x[k]); });
    }
  }
  walk(arr);
  return out;
}

// ── ログイン ──────────────────────────────
function renderLogin(msg) {
  topbar.hidden = true;
  app.innerHTML = '<div class="login-wrap"><div class="card">'
    + '<h2>スタッフログイン</h2>'
    + (msg ? '<div class="err">' + esc(msg) + '</div>' : '')
    + '<input id="em" type="email" placeholder="メールアドレス" autocomplete="username">'
    + '<input id="pw" type="password" placeholder="パスワード" autocomplete="current-password">'
    + '<button class="btn" id="loginBtn">ログイン</button>'
    + '</div></div>';
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
}
async function doLogin() {
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email: em, password: pw });
  btn.disabled = false;
  if (error) { renderLogin('ログインできませんでした。メールアドレスとパスワードをご確認ください。'); return; }
  location.hash = '#/';
  render();
}

// ── 日別予約一覧 ──────────────────────────
async function renderDay(dateStr) {
  const d = dateStr || jstToday();
  app.innerHTML = '<div class="empty">読み込み中…</div>';
  const from = d + 'T00:00:00+09:00';
  const to = addDays(d, 1) + 'T00:00:00+09:00';
  const { data, error } = await sb.from('crm_reservations').select('*')
    .gte('booking_start', from).lt('booking_start', to)
    .eq('status', 'accepted').order('booking_start');
  if (error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(error.message) + '</div>'; return; }
  const checks = await fetchChecks(d, addDays(d, 1));
  const meta = await fetchCustMeta(data);
  // 当日カルテを書いたお客様（📝マーク用）と当日のシフト（休みチップ用）
  const karteToday = {};
  {
    const kt = await sb.from('crm_karte_notes').select('merchant_id,customer_id')
      .gte('created_at', from).lt('created_at', to).limit(500);
    (kt.data || []).forEach(function(x) { karteToday[custKey(x.merchant_id, x.customer_id)] = true; });
  }
  const dayShiftsL = await fetchShifts(d, addDays(d, 1));

  let html = '<div class="daynav">'
    + '<button id="prevD">←</button>'
    + '<input type="date" id="dayPick" value="' + d + '">'
    + '<button id="nextD">→</button>'
    + '<button id="todayD">今日</button>'
    + '</div>';
  html += '<h2>' + fmtDate(from) + ' の予約 ' + (data.length ? '（' + data.length + '件）' : '') + '</h2>';

  if (!data.length) {
    html += '<div class="empty">この日の予約はありません</div>';
  } else {
    const groups = {};
    data.forEach(function(r) {
      const st = (r.staff_names && r.staff_names[0]) || '担当未設定';
      (groups[st] = groups[st] || []).push(r);
    });
    const gnames = Object.keys(groups).sort();
    // スタッフ別の件数サマリー（✓チェックイン・📝カルテ済み）
    html += '<div class="chips">';
    gnames.forEach(function(st) {
      const done = groups[st].filter(function(r) { return checks[r.reservation_id]; }).length;
      const kd = groups[st].filter(function(r) { return karteToday[custKey(r.merchant_id, r.customer_id)]; }).length;
      const full = kd >= groups[st].length ? ' ✅' : '';
      html += '<a style="pointer-events:none">' + esc(st) + ' ' + groups[st].length + '件（✓' + done + '・📝' + kd + '/' + groups[st].length + '）' + full + '</a>';
    });
    // 今日休みのスタッフを赤チップで表示
    dayShiftsL.filter(function(s) { return s.kind === 'off'; }).forEach(function(s) {
      html += '<a class="offchip">🌙 ' + esc(s.staff_name) + ' ' + esc(s.label || '休み') + '</a>';
    });
    html += '</div><div class="listcols">';
    gnames.forEach(function(st) {
      const rows = groups[st];
      html += '<div class="grp"><div class="staff-head">' + esc(st) + ' <span class="cnt">' + rows.length + '件</span></div>';
      rows.forEach(function(r) {
        const ck = checks[r.reservation_id];
        html += '<div class="rowwrap">'
          + '<button class="ck' + (ck ? ' on' : '') + '" data-rid="' + r.reservation_id + '" title="' + (ck ? esc((ck.checked_by_name || '') + ' が確認済み') : '見た印を付ける') + '">✓</button>'
          + '<a class="row" style="flex:1;margin-bottom:0" href="#/c/' + encodeURIComponent(r.merchant_id) + '/' + r.customer_id + '">'
          + '<span class="time">' + fmtTime(r.booking_start) + '</span>'
          + '<span class="cust">' + (karteToday[custKey(r.merchant_id, r.customer_id)] ? '📝' : '') + rowBadges(r, meta) + esc(r.customer_name || '（名前なし）')
          + (rowNextAction(r, meta) ? '<div class="nx">📌 ' + esc(rowNextAction(r, meta)) + '</div>' : '')
          + '</span>'
          + '<span class="menu">' + esc(r.menu || '') + '</span>'
          + '<span class="badge" style="background:' + storeColor(r.store_tag) + '">' + esc(r.store_tag || '') + '</span>'
          + '</a></div>';
      });
      html += '</div>';
    });
    html += '</div>';
  }
  app.innerHTML = html;
  document.getElementById('prevD').onclick = function() { location.hash = '#/?date=' + addDays(d, -1); };
  document.getElementById('nextD').onclick = function() { location.hash = '#/?date=' + addDays(d, 1); };
  document.getElementById('todayD').onclick = function() { location.hash = '#/'; };
  document.getElementById('dayPick').onchange = function(e) { location.hash = '#/?date=' + e.target.value; };
  Array.prototype.forEach.call(document.querySelectorAll('.ck'), function(btn) {
    btn.onclick = async function() {
      const rid = btn.getAttribute('data-rid');
      const r = data.find(function(x) { return String(x.reservation_id) === rid; });
      if (!r) return;
      btn.disabled = true;
      await toggleCheck(r, !!checks[r.reservation_id]);
      renderDay(dateStr);
    };
  });
}

// ── 顧客プロフィール ──────────────────────
async function renderCustomer(mid, cid) {
  app.innerHTML = '<div class="empty">読み込み中…</div>';
  const nowIso = new Date().toISOString();
  const [cRes, histRes, karteRes, lbRes, exRes, hoRes, poolRes] = await Promise.all([
    sb.from('crm_customers').select('*').eq('merchant_id', mid).eq('customer_id', cid).maybeSingle(),
    sb.from('crm_reservations').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('booking_start', { ascending: false }).limit(100),
    sb.from('crm_karte_notes').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('created_at', { ascending: false }).limit(50),
    sb.from('crm_customer_labels').select('*').eq('merchant_id', mid).eq('customer_id', cid).maybeSingle(),
    sb.from('crm_exercise_notes').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('created_at', { ascending: false }).limit(100),
    sb.from('crm_handover_notes').select('*').eq('merchant_id', mid).eq('customer_id', cid).order('created_at', { ascending: false }).limit(30),
    fetchRange(jstToday(), addDays(jstToday(), 14)),
  ]);
  const c = cRes.data;
  let hist = histRes.data || [];
  let karte = karteRes.data || [];
  const lb = lbRes.data;
  const exNotes = exRes.data || [];
  const handovers = hoRes.data || [];
  const staffPool = staffSet((poolRes && poolRes.data) || []);

  // 名寄せ: 他店舗に同じお客様（電話番号一致・なければ氏名一致）がいれば履歴・カルテを統合
  let linked = [];
  if (c && (c.phone || c.name)) {
    let lq = sb.from('crm_customers').select('merchant_id,customer_id,merchant_name,name,phone');
    lq = c.phone ? lq.eq('phone', c.phone) : lq.eq('name', c.name);
    const { data: cand } = await lq.limit(10);
    linked = (cand || []).filter(function(x) {
      return !(x.merchant_id === mid && String(x.customer_id) === String(cid));
    });
  }
  if (linked.length) {
    const jobs = [];
    linked.forEach(function(x) {
      jobs.push(sb.from('crm_reservations').select('*').eq('merchant_id', x.merchant_id).eq('customer_id', x.customer_id).order('booking_start', { ascending: false }).limit(100));
      jobs.push(sb.from('crm_karte_notes').select('*').eq('merchant_id', x.merchant_id).eq('customer_id', x.customer_id).order('created_at', { ascending: false }).limit(50));
    });
    const rs = await Promise.all(jobs);
    for (let i = 0; i < rs.length; i += 2) {
      hist = hist.concat(rs[i].data || []);
      karte = karte.concat(rs[i + 1].data || []);
    }
    hist.sort(function(a, b) { return a.booking_start < b.booking_start ? 1 : -1; });
    karte.sort(function(a, b) { return a.created_at < b.created_at ? 1 : -1; });
  }
  const name = (c && c.name) || (hist[0] && hist[0].customer_name) || '（不明）';

  const pagePrefix = '<a class="back" href="#/">← 予約一覧へ</a>';
  let html = '';

  // 基本情報
  html += '<div class="card c-basic"><h2>' + esc(name) + (c && c.kana ? ' <small style="color:var(--sub);font-weight:400">' + esc(c.kana) + '</small>' : '') + '</h2>';

  // 自動アラート（来店履歴と回数券から判定）＋ラベルの要約
  const pastArr = hist.filter(function(r) { return r.booking_start < nowIso && r.status === 'accepted'; });
  const stat = {
    past_visits: pastArr.length,
    last_visit: pastArr.length ? pastArr[0].booking_start : null,
    next_visit: hist.some(function(r) { return r.booking_start >= nowIso; }) ? 'yes' : null,
    avg_interval_days: pastArr.length > 1
      ? (new Date(pastArr[0].booking_start) - new Date(pastArr[pastArr.length - 1].booking_start)) / 86400000 / (pastArr.length - 1)
      : null,
  };
  const alerts = statAlerts(stat).concat(ticketAlerts(c && c.ticket_books));
  if (lb && lb.body_tags && lb.body_tags.length) alerts.unshift({ cls: 'warn', text: '⚠️ ' + lb.body_tags.join('・') });
  if (alerts.length) {
    html += '<div class="alertrow">';
    alerts.forEach(function(a) { html += '<span class="pill' + (a.cls ? ' ' + a.cls : '') + '">' + esc(a.text) + '</span>'; });
    html += '</div>';
  }
  if (linked.length) {
    html += '<div style="font-size:12px;margin:4px 0">🔗 他店舗にも登録: ';
    html += linked.map(function(x) {
      return '<a style="color:var(--accent)" href="#/c/' + encodeURIComponent(x.merchant_id) + '/' + x.customer_id + '">' + esc((x.merchant_name || '').split(/[\s　]/).pop() || '') + '</a>';
    }).join('・');
    html += '（来店実績・履歴・カルテは全店舗を統合表示中）</div>';
  }
  if (lb && lb.next_action) html += '<div class="nx" style="font-size:14px;margin:4px 0">📌 次回: ' + esc(lb.next_action) + '</div>';
  if (lb && lb.personality) html += '<div style="font-size:13px;color:var(--sub);margin:4px 0">💬 ' + esc(lb.personality) + '</div>';
  if (lb && lb.profile_note) html += '<div style="font-size:13px;color:var(--sub);margin:4px 0;white-space:pre-wrap">👤 ' + esc(lb.profile_note) + '</div>';
  if (lb && lb.goal_tags && lb.goal_tags.length) html += '<div style="font-size:13px;margin:4px 0">🎯 ' + esc(lb.goal_tags.join('・')) + '</div>';

  html += '<dl class="kv">';
  if (c) {
    if (c.merchant_name) html += '<dt>店舗</dt><dd>' + esc(c.merchant_name) + '</dd>';
    if (c.phone) html += '<dt>電話</dt><dd><a href="tel:' + esc(c.phone) + '">' + esc(c.phone) + '</a></dd>';
    if (c.email) html += '<dt>メール</dt><dd>' + esc(c.email) + '</dd>';
    if (c.membership_number) html += '<dt>会員番号</dt><dd>' + esc(c.membership_number) + '</dd>';
    if (c.birthday) html += '<dt>生年月日</dt><dd>' + esc(c.birthday) + '</dd>';
    if (c.channel) html += '<dt>集客経路</dt><dd>' + esc(c.channel) + '</dd>';
    if (c.first_reserved_at) html += '<dt>初回予約</dt><dd>' + fmtDate(c.first_reserved_at) + '</dd>';
  }
  const pastVisits = hist.filter(function(r){ return r.booking_start < nowIso && r.status === 'accepted'; });
  const totalSpent = hist.reduce(function(a, r){ return a + (r.booking_start < nowIso ? (Number(r.price) || 0) : 0); }, 0);
  const nextVisit = hist.filter(function(r){ return r.booking_start >= nowIso; }).length;
  html += '<dt>来店実績</dt><dd>' + pastVisits.length + '回' + (nextVisit ? '（次回で' + (pastVisits.length + 1) + '回目）' : '') + '</dd>';

  // 累計支払額 = 月謝（月額×契約月数）+ 回数券購入額 + 都度払い
  function monthsBetween(fromIso, toIso) {
    const f = new Date(fromIso), t = new Date(toIso);
    return Math.max(1, (t.getFullYear() - f.getFullYear()) * 12 + (t.getMonth() - f.getMonth()) + 1);
  }
  let subTotal = 0;
  const payParts = [];
  ((c && c.subscriptions) || []).forEach(function(s) {
    if (!s.amount || !s.contract_at) return;
    const endIso = s.contract_end_at || new Date().toISOString();
    const mcount = monthsBetween(s.contract_at, endIso);
    subTotal += Number(s.amount) * mcount;
    const fy = new Date(s.contract_at);
    payParts.push(esc((s.product_name || '月謝')) + ' ' + Number(s.amount).toLocaleString('ja-JP') + '円×' + mcount + 'ヶ月'
      + '（' + fy.getFullYear() + '/' + (fy.getMonth() + 1) + '〜' + (s.contract_end_at ? '解約' : '継続中') + '）');
  });
  let ticketTotal = 0;
  ((c && c.ticket_books) || []).forEach(function(t) { ticketTotal += Number(t.amount) || 0; });
  if (ticketTotal) payParts.push('回数券 ' + ticketTotal.toLocaleString('ja-JP') + '円');
  if (totalSpent) payParts.push('都度払い ' + totalSpent.toLocaleString('ja-JP') + '円');
  const payTotal = subTotal + ticketTotal + totalSpent;
  html += '<dt>累計支払額</dt><dd><b style="font-size:16px;color:var(--accent-d)">' + payTotal.toLocaleString('ja-JP') + '円</b>'
    + ' <small style="color:var(--sub)">（推計）</small>'
    + (payParts.length ? '<div style="font-size:11.5px;color:var(--sub);margin-top:2px">' + payParts.join('　＋　') + '</div>' : '')
    + '</dd>';
  html += '</dl>';

  // 月謝・回数券
  const subs = (c && c.subscriptions) || [];
  const tickets = (c && c.ticket_books) || [];
  if (subs.length || tickets.length) {
    html += '<h3>月謝・回数券</h3><div>';
    subs.forEach(function(s) {
      const st = s.contract_status === 'active' ? '継続中' : '停止中';
      html += '<span class="pill' + (s.contract_status === 'active' ? '' : ' warn') + '">' + esc(s.product_name || '月謝') + '｜' + st + '</span>';
    });
    tickets.forEach(function(t) {

      html += '<span class="pill' + (low ? ' warn' : '') + '">' + esc(t.product_name || '回数券')

        + (t.expires_at ? '（' + fmtDate(t.expires_at) + 'まで）' : '') + '</span>';
    });
    html += '</div>';
  }

  // STORESメモ
  if (c && c.memo) {
    html += '<h3>STORES顧客メモ</h3><div style="white-space:pre-wrap;font-size:14px">' + esc(c.memo) + '</div>';
  }

  // アンケート・プロフィール項目
  const qa = qaItems(c && c.profile_fields).concat(qaItems(hist.slice(0, 3).map(function(r){ return r.questionnaires; })));

  html += '</div>';

  var cardBasic = html; html = '';
  // 📮 申し送り（次の担当者へ・宛先指定＋済みチェック＋鮮度表示）
  html += '<div class="card c-ho"><h2>📮 申し送り（次の担当者へ）</h2>'
    + '<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">'
    + '<span style="font-size:13px;color:var(--sub)">宛先</span>'
    + '<select id="hoTo" style="border:1px solid var(--line);border-radius:10px;padding:9px;font-size:14px;background:#fff"><option>全員</option>';
  staffPool.forEach(function(n) { html += '<option>' + esc(n) + '</option>'; });
  html += '</select></div>'
    + '<textarea id="hoNote" placeholder="例: 次回担当の方へ。前回腰に張りあり、強度は控えめから様子見てください（🎤で音声入力）"></textarea>'

    html += '<div class="note"><div class="meta">➡️ <b>' + esc(n.to_staff) + '</b> さんへ｜' + esc(n.author_name || '') + '・<b>' + fmtAgo(n.created_at) + '</b></div>'
      + '<div style="white-space:pre-wrap;font-size:14px">' + esc(n.note) + '</div>'
      + '<div style="text-align:right;margin-top:4px"><button class="tagbtn" data-hodone="' + n.id + '">✅ 対応済みにする</button></div></div>';
  });

      + '<div style="white-space:pre-wrap;font-size:13px">' + esc(n.note) + '</div></div>';

  GOAL_TAGS.forEach(function(t) {
    html += '<button class="tagbtn' + (goalNow.indexOf(t) >= 0 ? ' on' : '') + '" data-g="goal" data-t="' + esc(t) + '">' + esc(t) + '</button>';
  });
  html += '</div><h3>💬 接し方メモ（性格・好み）</h3>'

    + '</div>';

  var cardLb = html; html = '';

  ['ダウンストレッチ', 'ハンドレッド', 'ロールアップ', 'スワン', 'エレファント', 'フットワーク', 'ショルダーブリッジ', 'ティーザー'].forEach(function(n) { exNameSet[n] = 1; });
  html += '<div class="card c-ex"><h2>🏃 エクササイズの気づき（代償・苦手）</h2>'
    + '<div style="display:flex;gap:8px;margin-bottom:6px">'
    + '<input id="exName" list="exList" placeholder="エクササイズ名" style="flex:1;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px">'
    + '<datalist id="exList">';
  Object.keys(exNameSet).sort().forEach(function(n) { html += '<option value="' + esc(n) + '">'; });
  html += '</datalist></div>'
    + '<textarea id="exObs" placeholder="例: 肩が上がってしまい腹筋に力が入らない・腕で頑張ってしまう（🎤で音声入力）"></textarea>'
    + '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px"><button class="mic" id="exMic">🎤 音声入力</button><button class="btn" id="exSave">記録</button></div>';
  if (!exNotes.length) {

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const btn = document.getElementById(btnId);

    if (!SR) { btn.style.display = 'none'; return; }

      recog.interimResults = false;
      recog.continuous = true;
      btn.classList.add('rec');
      btn.textContent = '⏹ 停止';
      recog.onresult = function(e) {

      recog.onend = function() {

      };
      recog.onerror = recog.onend;
      recog.start();

async function renderSearch(q) {
  let html = '<h2>顧客検索</h2><div class="searchbar">'
    + '<input id="sq" placeholder="名前・カナ・電話番号" value="' + esc(q || '') + '">'
    + '<button class="btn" id="sBtn">検索</button></div><div id="sRes"></div>';
  app.innerHTML = html;
  const go = function() {
    const v = document.getElementById('sq').value.trim();
    if (v) { location.hash = '#/search?q=' + encodeURIComponent(v); }
  };
  document.getElementById('sBtn').onclick = go;
  document.getElementById('sq').addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });

  if (q) {
    const like = '%' + q + '%';
    const { data, error } = await sb.from('crm_customers').select('*')
      .or('name.ilike.' + like + ',kana.ilike.' + like + ',phone.ilike.' + like)
      .order('last_reserved_at', { ascending: false, nullsFirst: false }).limit(30);
    const res = document.getElementById('sRes');

    if (!data.length) { res.innerHTML = '<div class="empty">見つかりませんでした</div>'; return; }
    let out = '';
    data.forEach(function(c) {
      out += '<a class="row" href="#/c/' + encodeURIComponent(c.merchant_id) + '/' + c.customer_id + '">'
        + '<span class="cust">' + esc(c.name || '') + '</span>'
        + '<span class="menu">' + esc(c.kana || '') + '</span>'

        + '</a>';
    });
    res.innerHTML = out;
  } else {
    document.getElementById('sq').focus();
  }
}

const TL_START = 540, TL_END = 1290, TL_TOTAL = TL_END - TL_START; // 9:00〜21:30
const WDAYS = ['日', '月', '火', '水', '木', '金', '土'];
function nw(s) { return String(s || '').replace(/[\s　]+/g, ''); }
function wdow(dstr) { return new Date(dstr + 'T12:00:00+09:00').getUTCDay(); }
function fmtMD(dstr) { return parseInt(dstr.slice(5, 7), 10) + '/' + parseInt(dstr.slice(8, 10), 10) + '(' + WDAYS[wdow(dstr)] + ')'; }
function weekStart(dstr) { return addDays(dstr, -((wdow(dstr) + 6) % 7)); }
function minsOf(iso) {
  const parts = new Intl.DateTimeFormat('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: TZ }).format(new Date(iso)).split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}
function tlHash(mode, kv) {
  let h = '#/tl?mode=' + mode;
  Object.keys(kv).forEach(function(k) { if (kv[k]) h += '&' + k + '=' + encodeURIComponent(kv[k]); });
  return h;
}

// ── 顧客ラベル・自動アラート ─────────────────
const BODY_TAGS = ['腰', '膝', '肩', '首', '妊娠中', '産後', '高血圧', '手術歴あり'];
const GOAL_TAGS = ['姿勢改善', '腰痛改善', '肩こり改善', 'ダイエット', '体力づくり', '産後回復', '競技力向上', 'リラックス'];
function custKey(mid, cid) { return mid + '|' + cid; }
async function fetchCustMeta(rows) {
  const ids = [];
  const seen = {};
  rows.forEach(function(r) {
    if (r.customer_id && !seen[r.customer_id]) { seen[r.customer_id] = 1; ids.push(r.customer_id); }
  });
  const out = { labels: {}, stats: {}, handovers: {} };
  if (!ids.length) return out;
  // URL長制限対策: 150件ずつに分割して取得
  const chunks = [];
  for (let i = 0; i < ids.length; i += 150) chunks.push(ids.slice(i, i + 150));
  const jobs = [];
  chunks.forEach(function(ch) {
    jobs.push(sb.from('crm_customer_labels').select('*').in('customer_id', ch));
    jobs.push(sb.from('crm_customer_stats').select('*').in('customer_id', ch));
    jobs.push(sb.from('crm_handover_notes').select('merchant_id,customer_id,to_staff').eq('done', false).in('customer_id', ch));
  });
  const results = await Promise.all(jobs);
  for (let i = 0; i < results.length; i += 3) {
    (results[i].data || []).forEach(function(x) { out.labels[custKey(x.merchant_id, x.customer_id)] = x; });
    (results[i + 1].data || []).forEach(function(x) { out.stats[custKey(x.merchant_id, x.customer_id)] = x; });
    (results[i + 2].data || []).forEach(function(x) {
      const k = custKey(x.merchant_id, x.customer_id);
      (out.handovers[k] = out.handovers[k] || []).push(x);
    });
  }
  return out;
}
function rowBadges(r, meta) {
  const k = custKey(r.merchant_id, r.customer_id);
  const lb = meta.labels[k];
  const st = meta.stats[k];
  let b = '';
  if (st && st.past_visits < 3) b += '🆕';
  if (lb && lb.body_tags && lb.body_tags.length) b += '⚠️';
  if (lb && lb.next_action) b += '📌';
  if (meta.handovers && meta.handovers[k] && meta.handovers[k].length) b += '📮';
  return b;
}
function rowNextAction(r, meta) {
  const lb = meta.labels[custKey(r.merchant_id, r.customer_id)];
  return (lb && lb.next_action) || '';
}
function daysBetween(iso, now) { return Math.floor((now - new Date(iso)) / 86400000); }
function statAlerts(st) {
  // crm_customer_stats の1行 → 自動アラートの配列（{cls, text}）
  const out = [];
  if (!st) return out;
  const now = Date.now();
  const gap = st.last_visit ? daysBetween(st.last_visit, now) : null;
  if ((st.past_visits || 0) === 0) out.push({ cls: '', text: '🆕 初回のお客様' });
  else if (st.past_visits < 3) out.push({ cls: '', text: '🆕 定着前（来店' + st.past_visits + '回）' });
  if (!st.next_visit && gap !== null) {
    const threshold = Math.max(21, (st.avg_interval_days || 14) * 1.5);
    if (gap > 90) out.push({ cls: 'warn', text: '💤 休眠（' + gap + '日来店なし）' });
    else if (gap > threshold) {
      // 長期のお客様（15回以上）は関係性ができているため🟡ゆるやか判定（大地さん方針）
      if ((st.past_visits || 0) >= 15) out.push({ cls: 'mild', text: '🟡 ペース変化・様子見（長期のお客様・前回から' + gap + '日）' });
      else out.push({ cls: 'warn', text: '🔴 離脱注意（前回から' + gap + '日・次回予約なし）' });
    }
  }
  return out;
}
function ticketAlerts(ticketBooks) {
  const out = [];
  (ticketBooks || []).forEach(function(t) {
    const remain = t.remaining_tickets;
    const exp = t.expires_at ? daysBetween(t.expires_at, Date.now()) : null; // 期限まで負の日数
    if (remain != null && remain > 0 && remain <= 2) {
      out.push({ cls: 'warn', text: '💳 回数券 残' + remain + '回 → 次の案内を' });
    } else if (exp !== null && exp > -30 && exp <= 0 && remain > 0) {
      out.push({ cls: 'warn', text: '💳 回数券 期限まで' + (-exp) + '日（残' + remain + '回）' });
    }
  });
  return out;
}

// シフト表の店舗表記 → 予約データの店舗タグ
const SHIFT_STORE_TAG = { '本店': '金沢本店', '駅西': '金沢駅西店', '富山東': '富山東店', '福井': '福井' };
function shiftFor(shifts, staffName, dateStr) {
  return shifts.find(function(s) { return nw(s.staff_name) === nw(staffName) && s.date === dateStr; });
}
function codeTimes(c) {
  if (!c || !c.start_time) return '';
  let t = c.start_time + '-' + c.end_time;
  if (c.start2) t += '/' + c.start2 + '-' + c.end2;
  return t;
}
function shiftTagHtml(sh, codes) {
  if (!sh) return '';
  if (sh.kind === 'off') return '<div class="shtag off">' + esc(sh.label || '休み') + '</div>';
  if (sh.kind === 'other') return '<div class="shtag oth">' + esc(sh.label || '') + '</div>';
  let t = '出勤';
  if (sh.code) {
    const c = codes[sh.code];
    const times = codeTimes(c);
    t = sh.code + (times ? ' ' + times : '');
  }
  return '<div class="shtag">' + esc(t + (sh.store ? '【' + sh.store + '】' : '')) + '</div>';
}
function _shoffDiv(a, b) {
  return '<div class="shoff" style="left:' + ((a - TL_START) / TL_TOTAL * 100) + '%;width:' + ((b - a) / TL_TOTAL * 100) + '%"></div>';
}
function shiftShadeHtml(sh, codes) {
  if (!sh) return '';
  if (sh.kind === 'off') return '<div class="shoff offday" style="left:0;width:100%">🌙 ' + esc(sh.label || '休み') + '</div>';
  if (sh.kind === 'other') return '<div class="shoff oth" style="left:0;width:100%">' + esc(sh.label || '') + '</div>';
  const c = sh.code ? codes[sh.code] : null;
  if (!c || !c.start_time) return '';
  // 勤務区間（中抜けシフトは2区間）の外側を斜線で塗る
  const segs = [[hm2m(c.start_time), hm2m(c.end_time)]];
  if (c.start2) segs.push([hm2m(c.start2), hm2m(c.end2)]);
  segs.sort(function(x, y) { return x[0] - y[0]; });
  let h = '';
  let cur = TL_START;
  segs.forEach(function(sg) {
    const s = Math.max(sg[0], TL_START);
    const e = Math.min(sg[1], TL_END);
    if (s > cur) h += _shoffDiv(cur, s);
    cur = Math.max(cur, e);
  });
  if (cur < TL_END) h += _shoffDiv(cur, TL_END);
  return h;
}

// ── 休み・ブロック枠（ボード側管理。STORES APIはシフト/ブロックを提供しない） ──
async function fetchBlocks(fromDate, toDateExcl) {

function hm2m(s) { const p = String(s || '').split(':'); return parseInt(p[0], 10) * 60 + (parseInt(p[1], 10) || 0); }
function tbBlocksHtml(blocks) {

    let left = 0, width = 100;
    if (b.start_time) {
      const s = Math.max(hm2m(b.start_time), TL_START);

      width = (e - s) / TL_TOTAL * 100;
    }

    h += '<div class="tbblk' + mv + '" data-bid="' + b.id + '" style="left:' + left + '%;width:' + width + '%"'
      + ' title="タップで削除: ' + esc(reasonText + ' （登録: ' + (b.created_by_name || '') + '）') + (mv ? '｜予約希望があれば動かせる枠' : '') + '">'
      + esc((mv ? '↔' : '') + reasonText) + (b.start_time ? '' : '（終日）') + '</div>';

  return h;
}
function blocksFor(blocks, staffName, dateStr) {
  return blocks.filter(function(b) {
    return nw(b.staff_name) === nw(staffName) && (!dateStr || b.date === dateStr);
  });
}
function unionStaffs(rows, blocks) {
  const s = {};
  rows.forEach(function(r) { resStaffs(r).forEach(function(n) { s[n] = true; }); });
  blocks.forEach(function(b) { if (b.staff_name) s[b.staff_name] = true; });
  return Object.keys(s).sort();
}
function wireBlockDelete(rerender) {

      if (!confirm('この休み/ブロックを削除しますか？')) return;
      await sb.from('crm_time_blocks').delete().eq('id', bid);
      rerender();
    };

}
function blockFormHtml(staffs, selStaff, dateVal) {

    + '<button class="btn" id="tbAdd">追加</button>'
    + '</div>';
}
function wireBlockForm(rerender) {
  const toggle = document.getElementById('tbToggle');
  const form = document.getElementById('tbForm');
  if (!toggle || !form) return;
  toggle.onclick = function() { form.hidden = !form.hidden; };
  document.getElementById('tbAll').onchange = function(e) {
    document.getElementById('tbFrom').disabled = e.target.checked;
    document.getElementById('tbTo').disabled = e.target.checked;
  };
  document.getElementById('tbAdd').onclick = async function() {
    const all = document.getElementById('tbAll').checked;
    const { data: sess } = await sb.auth.getUser();
    const u = sess && sess.user;
    const payload = {
      staff_name: document.getElementById('tbStaff').value,
      date: document.getElementById('tbDate').value,
      start_time: all ? null : document.getElementById('tbFrom').value,
      end_time: all ? null : document.getElementById('tbTo').value,
      reason: document.getElementById('tbReason').value,
      note: document.getElementById('tbNote').value.trim() || null,
      created_by_name: (u && u.user_metadata && u.user_metadata.name) || (await myStaffName()) || (u && u.email) || '',
    };
    if (!payload.staff_name || !payload.date) return;
    const { error } = await sb.from('crm_time_blocks').insert(payload);
    if (error) { alert('追加できませんでした: ' + error.message); return; }
    rerender();
  };
}
function dayNameCls(d, today) {
  const w = wdow(d);
  let cls = '';
  if (w === 6) cls = ' sat';
  if (w === 0) cls = ' sun';
  return cls + (d === today ? '" style="text-decoration:underline' : '');
}

let MY_STAFF = null;
async function myStaffName() {
  if (MY_STAFF !== null) return MY_STAFF;

    const { data } = await sb.from('crm_staff_allowlist').select('display_name');
    MY_STAFF = (data && data[0] && data[0].display_name) || '';
  } catch (e) { MY_STAFF = ''; }

}
function resStaffs(r) { return (r.staff_names && r.staff_names.length) ? r.staff_names : ['担当未設定']; }
function staffSet(rows) {
  const s = {};
  rows.forEach(function(r) { resStaffs(r).forEach(function(n) { s[n] = true; }); });
  return Object.keys(s).sort();
}
function byStaff(rows, name) {

}
function tlHeadHtml() {
  let h = '<div class="tlhead"><div class="tlname"></div><div class="tltrack">';
  for (let m = TL_START; m < TL_END; m += 60) {
    h += '<span class="tlhour" style="left:' + ((m - TL_START) / TL_TOTAL * 100) + '%">' + (m / 60) + ':00</span>';
  }
  return h + '</div></div>';
}
function tlBlocksHtml(rows, checks, meta) {
  let h = '';
  rows.forEach(function(r) {
    let s = minsOf(r.booking_start);
    let e = r.booking_end ? minsOf(r.booking_end) : s + 50;
    if (e <= s) e = s + 50;
    s = Math.max(s, TL_START); e = Math.min(e, TL_END);
    if (e <= TL_START || s >= TL_END) return;
    const left = (s - TL_START) / TL_TOTAL * 100;
    const width = (e - s) / TL_TOTAL * 100;
    const done = checks && checks[r.reservation_id] ? '✓' : '';
    const badges = meta ? rowBadges(r, meta) : '';
    const nx = meta ? rowNextAction(r, meta) : '';
    const timeStr = fmtTime(r.booking_start) + (r.booking_end ? '-' + fmtTime(r.booking_end) : '');
    h += '<a class="tlblock" style="left:' + left + '%;width:' + width + '%;background:' + storeColor(r.store_tag) + (done ? ';opacity:.72' : '') + '"'
      + ' href="#/c/' + encodeURIComponent(r.merchant_id) + '/' + r.customer_id + '"'
      + ' title="' + esc(timeStr + ' ' + (r.customer_name || '') + ' / ' + (r.menu || '') + '【' + (r.store_tag || '') + '】' + (nx ? ' 📌' + nx : '')) + '">'
      + '<div class="tlb-n">' + done + badges + esc(r.customer_name || '予約') + '</div>'
      + '<div class="tlb-t">' + esc(timeStr) + '</div>'
      + '<div class="tlb-t">' + esc(nx ? '📌' + nx : (r.menu || '')) + '</div>'
      + '</a>';
  });
  return h;
}
function fmtAgo(iso) {
  // 「今日 14:02」「昨日」「3日前（7/13）」— 情報の鮮度が一目で分かる表記
  if (!iso) return '';
  const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(iso));
  const today = jstToday();
  const diff = Math.round((new Date(today + 'T12:00:00+09:00') - new Date(d + 'T12:00:00+09:00')) / 86400000);
  const md = parseInt(d.slice(5, 7), 10) + '/' + parseInt(d.slice(8, 10), 10);
  if (diff <= 0) return '今日 ' + fmtTime(iso);
  if (diff === 1) return '昨日（' + md + '）';
  return diff + '日前（' + md + '）';
}
function tlTabsHtml(mode, date, staff) {
  const ym = date.slice(0, 7);
  return '<div class="tabs">'
    + '<a class="' + (mode === 'day' ? 'on' : '') + '" href="' + tlHash('day', { date: date, staff: staff }) + '">日</a>'
    + '<a class="' + (mode === 'week' ? 'on' : '') + '" href="' + tlHash('week', { date: date, staff: staff }) + '">週</a>'
    + '<a class="' + (mode === 'month' ? 'on' : '') + '" href="' + tlHash('month', { ym: ym, staff: staff, date: date }) + '">月</a>'
    + '</div>';
}
async function renderTimeline(params) {
  const mode = params.get('mode') || 'day';
  const today = jstToday();
  const date = params.get('date') || today;
  let staff = params.get('staff') || '';
  app.innerHTML = '<div class="empty">読み込み中…</div>';

  if (mode === 'day') {
    const { data, error } = await fetchRange(date, addDays(date, 1));
    if (error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(error.message) + '</div>'; return; }
    const dayChecks = await fetchChecks(date, addDays(date, 1));
    const dayBlocks = await fetchBlocks(date, addDays(date, 1));
    const dayMeta = await fetchCustMeta(data);
    const dayShifts = await fetchShifts(date, addDays(date, 1));
    const codes = await shiftCodes();
    const dayCal = await fetchCalEvents(date, addDays(date, 1));
    const dayAvail = await fetchAvail(date, addDays(date, 1));
    const storeSel = params.get('store') || '';
    const stores = {};
    data.forEach(function(r) { if (r.store_tag) stores[r.store_tag] = true; });
    // シフト上の勤務店舗（本店など予約がない店も）をチップに含める
    dayShifts.forEach(function(s) {
      if (s.kind === 'work' && s.store && SHIFT_STORE_TAG[s.store]) stores[SHIFT_STORE_TAG[s.store]] = true;
    });
    const rows = storeSel ? data.filter(function(r) { return r.store_tag === storeSel; }) : data;

    let html = tlTabsHtml('day', date, staff);
    html += '<div class="selbar">'
      + '<button id="tlPrev">←</button>'
      + '<input type="date" id="tlDate" value="' + date + '">'
      + '<button id="tlNext">→</button>'
      + '<button id="tlToday">今日</button>'
      + '<span style="font-weight:700">' + fmtMD(date) + '　' + rows.length + '件</span>'
      + '<button id="tbToggle">＋休み/ブロック</button>'
      + '<a href="https://coubic.com/dashboard" target="_blank" rel="noopener" style="margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none">＋STORESで予約登録</a>'
      + '</div>';
    const mineName = await myStaffName();
    const mineOnly = params.get('mine') === '1';
    html += '<div class="chips"><a class="' + (storeSel || mineOnly ? '' : 'on') + '" href="' + tlHash('day', { date: date }) + '">全店</a>';
    Object.keys(stores).sort().forEach(function(st) {
      html += '<a class="' + (storeSel === st ? 'on' : '') + '" href="' + tlHash('day', { date: date, store: st }) + '">' + esc(st) + '</a>';
    });
    if (mineName) {
      html += '<a class="' + (mineOnly ? 'on' : '') + '" href="' + tlHash('day', mineOnly ? { date: date } : { date: date, mine: '1' }) + '">👤 自分のみ</a>';
    }
    html += '</div>';

    let staffs = unionStaffs(rows, dayBlocks);
    // シフト上「出勤」なのに予約ゼロのスタッフも行を出す（空きが見えるように）
    shiftStaffs(dayShifts, date).forEach(function(sn) {
      if (!staffs.some(function(x) { return nw(x) === nw(sn); })) staffs.push(sn);
    });
    // 店舗で絞り込み中は、その店舗に予約またはシフトがある人だけ表示
    if (storeSel) {
      staffs = staffs.filter(function(st) {
        if (byStaff(rows, st).length) return true;
        const sh = shiftFor(dayShifts, st, date);
        return sh && sh.store && SHIFT_STORE_TAG[sh.store] === storeSel;
      });
    }
    // ログイン本人の行を最上部に
    staffs.sort(function(a, b) {
      const am = nw(a) === nw(mineName) ? 0 : 1;
      const bm = nw(b) === nw(mineName) ? 0 : 1;
      return am - bm || a.localeCompare(b);
    });
    if (mineOnly) staffs = staffs.filter(function(st) { return nw(st) === nw(mineName); });
    html += blockFormHtml(staffs, staffs[0] || '', date);
    if (!staffs.length) {
      html += '<div class="empty">この日の予約はありません</div>';
    } else {
      html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
      staffs.forEach(function(st) {
        const me = nw(st) === nw(mineName) ? ' me' : '';
        const sh = shiftFor(dayShifts, st, date);
        html += '<div class="tlrow"><div class="tlname' + me + '">' + (me ? '👤 ' : '') + esc(st) + shiftTagHtml(sh, codes) + '</div><div class="tltrack">'
          + shiftShadeHtml(sh, codes)
          + availBlocksHtml(availFor(dayAvail, st, date))
          + tbBlocksHtml(blocksFor(dayBlocks, st, date))
          + calBlocksHtml(calFor(dayCal, st, date))
          + tlBlocksHtml(byStaff(rows, st), dayChecks, dayMeta) + '</div></div>';
      });
      html += '</div></div>';
      html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px"><span style="color:#1f6f54;font-weight:700">緑点線「空」＝今お客様が予約できる枠（STORES公開情報・10分ごと更新）</span>｜斜線＝シフト外・休み・会議（シフト表/カレンダーから自動）｜グレー＝固定ブロック（休憩・休み）｜<span style="color:#805e12;font-weight:700">琥珀↔＝動かせるブロック</span>。緑もグレーも無い時間＝STORES側でブロック済みか受付対象外です</div>';
    }
    app.innerHTML = html;
    const rerenderDay = function() { renderTimeline(params); };
    wireBlockDelete(rerenderDay);
    wireBlockForm(rerenderDay);
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash('day', { date: addDays(date, -1), store: storeSel }); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash('day', { date: addDays(date, 1), store: storeSel }); };
    document.getElementById('tlToday').onclick = function() { location.hash = tlHash('day', {}); };
    document.getElementById('tlDate').onchange = function(e) { location.hash = tlHash('day', { date: e.target.value, store: storeSel }); };
    return;
  }

  if (mode === 'week' || mode === 'month') {
    // 週＝7日、月＝月曜始まりでその月を含む全週。日付を縦に積んだタイムライン（週の延長線上に月がある表示）
    let start, daysN, label, prevKey, nextKey;
    if (mode === 'week') {
      start = weekStart(date);
      daysN = 7;
      label = fmtMD(start) + '〜' + fmtMD(addDays(start, 6));
      prevKey = { date: addDays(start, -7), staff: staff };
      nextKey = { date: addDays(start, 7), staff: staff };
    } else {
      const ym = (params.get('ym') || date.slice(0, 7));
      const first = ym + '-01';
      const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
      const last = ym + '-' + String(dim).padStart(2, '0');
      start = weekStart(first);                       // 月曜始まり
      const endW = addDays(weekStart(last), 7);       // 最終週の日曜まで
      daysN = Math.round((new Date(endW + 'T12:00:00+09:00') - new Date(start + 'T12:00:00+09:00')) / 86400000);
      label = parseInt(ym.slice(0, 5), 10) + '年' + parseInt(ym.slice(5, 7), 10) + '月';
      prevKey = { ym: addDays(first, -1).slice(0, 7), staff: staff, date: date };
      nextKey = { ym: addDays(last, 1).slice(0, 7), staff: staff, date: date };
    }
    const endExcl = addDays(start, daysN);
    const [resQ, checks, blocks, shifts, codes, calEvts, avail] = await Promise.all([
      fetchRange(start, endExcl), fetchChecks(start, endExcl), fetchBlocks(start, endExcl),
      fetchShifts(start, endExcl), shiftCodes(), fetchCalEvents(start, endExcl), fetchAvail(start, endExcl),
    ]);
    if (resQ.error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(resQ.error.message) + '</div>'; return; }
    const data = resQ.data || [];
    const wkMeta = await fetchCustMeta(data);
    const staffs = unionStaffs(data, blocks);
    // シフト表に載っている人（大地さん等・予約ゼロでも）を選択肢に含める
    shiftStaffs(shifts, null).forEach(function(sn) {
      if (!staffs.some(function(x) { return nw(x) === nw(sn); })) staffs.push(sn);
    });
    staffs.sort();
    if (!staff) {
      const mine = await myStaffName();
      staff = staffs.find(function(n) { return nw(n) === nw(mine); }) || staffs[0] || '';
    }
    const allMode = staff === '*';
    const rows = allMode ? data : byStaff(data, staff);
    const dayMap = {};
    data.forEach(function(r) {
      const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
      (dayMap[d] = dayMap[d] || []).push(r);
    });

    let html = tlTabsHtml(mode, date, staff);
    html += '<div class="selbar">'
      + '<button id="tlPrev">←</button>'
      + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
      + '<button id="tlNext">→</button>'
      + '<select id="tlStaff"></select>'
      + '<span style="color:var(--sub)">' + rows.length + '件</span>'
      + '<button id="tbToggle">＋休み/ブロック</button>'
      + '<a href="https://coubic.com/dashboard" target="_blank" rel="noopener" style="margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none">＋STORESで予約登録</a>'
      + '</div>';
    html += blockFormHtml(staffs, allMode ? '' : staff, (today >= start && today < endExcl) ? today : start);
    html += '<div class="tlwrap"><div class="tl">' + tlHeadHtml();
    for (let i = 0; i < daysN; i++) {
      const d = addDays(start, i);
      const dayRows = dayMap[d] || [];
      if (allMode) {
        // 全スタッフ: 日付見出し + その日のスタッフ行を縦に積む（ワンモア管理画面風）
        html += '<div class="tlday' + (d === today ? '" style="color:var(--accent)' : '') + '">' + fmtMD(d) + '　<span style="font-weight:400;color:var(--sub)">' + dayRows.length + '件</span></div>';
        let ds = staffSet(dayRows);
        shiftStaffs(shifts, d).forEach(function(sn) {
          if (!ds.some(function(x) { return nw(x) === nw(sn); })) ds.push(sn);
        });
        ds.sort();
        if (!ds.length) {
          html += '<div class="tlrow"><div class="tlname" style="color:var(--sub);font-weight:400">—</div><div class="tltrack"></div></div>';
        }
        ds.forEach(function(st) {
          const sh = shiftFor(shifts, st, d);
          html += '<div class="tlrow"><div class="tlname">' + esc(st) + shiftTagHtml(sh, codes) + '</div><div class="tltrack">'
            + shiftShadeHtml(sh, codes)
            + availBlocksHtml(availFor(avail, st, d))
            + tbBlocksHtml(blocksFor(blocks, st, d))
            + calBlocksHtml(calFor(calEvts, st, d))
            + tlBlocksHtml(byStaff(dayRows, st), checks, wkMeta)
            + '</div></div>';
        });
      } else {
        const sh = shiftFor(shifts, staff, d);
        html += '<div class="tlrow"' + (i % 7 === 0 && i > 0 ? ' style="border-top:2px solid #cdd6d2"' : '') + '>'
          + '<div class="tlname' + dayNameCls(d, today) + '">' + fmtMD(d) + shiftTagHtml(sh, codes) + '</div>'
          + '<div class="tltrack">'
          + shiftShadeHtml(sh, codes)
          + availBlocksHtml(availFor(avail, staff, d))
          + tbBlocksHtml(blocksFor(blocks, staff, d))
          + calBlocksHtml(calFor(calEvts, staff, d))
          + tlBlocksHtml(byStaff(dayRows, staff), checks, wkMeta)
          + '</div></div>';
      }
    }
    html += '</div></div>';
    app.innerHTML = html;

    const sel = document.getElementById('tlStaff');
    const oAll = document.createElement('option');
    oAll.value = '*'; oAll.textContent = '全スタッフ'; if (allMode) oAll.selected = true;
    sel.appendChild(oAll);
    staffs.forEach(function(n) {
      const o = document.createElement('option');
      o.value = n; o.textContent = n; if (!allMode && nw(n) === nw(staff)) o.selected = true;
      sel.appendChild(o);
    });
    const keyBase = mode === 'week' ? { date: date } : { ym: (params.get('ym') || date.slice(0, 7)), date: date };
    sel.onchange = function(e) {
      const kv = {}; Object.keys(keyBase).forEach(function(k) { kv[k] = keyBase[k]; });
      kv.staff = e.target.value;
      location.hash = tlHash(mode, kv);
    };
    document.getElementById('tlPrev').onclick = function() { location.hash = tlHash(mode, prevKey); };
    document.getElementById('tlNext').onclick = function() { location.hash = tlHash(mode, nextKey); };
    const rerenderWk = function() { renderTimeline(params); };
    wireBlockDelete(rerenderWk);
    wireBlockForm(rerenderWk);
    return;
  }
}

// ── 日報・集計（スタッフ別の件数・対応済み・稼働・埋まり率・売上） ──
function durMins(r) {
  const s = minsOf(r.booking_start);
  let e = r.booking_end ? minsOf(r.booking_end) : s + 50;
  if (e <= s) e = s + 50;
  return e - s;
}
async function renderReport(params) {
  const range = params.get('range') || 'day';
  const today = jstToday();
  const date = params.get('date') || today;
  app.innerHTML = '<div class="empty">読み込み中…</div>';

  let from, toExcl, label, prevD, nextD;
  if (range === 'day') {
    from = date; toExcl = addDays(date, 1); label = fmtMD(date);
    prevD = addDays(date, -1); nextD = addDays(date, 1);
  } else if (range === 'week') {
    from = weekStart(date); toExcl = addDays(from, 7);
    label = fmtMD(from) + '〜' + fmtMD(addDays(from, 6));
    prevD = addDays(from, -7); nextD = addDays(from, 7);
  } else {
    const ym = date.slice(0, 7);
    from = ym + '-01';
    const dim = new Date(parseInt(ym.slice(0, 5), 10), parseInt(ym.slice(5, 7), 10), 0).getDate();
    toExcl = addDays(ym + '-' + String(dim).padStart(2, '0'), 1);
    label = parseInt(ym.slice(0, 5), 10) + '年' + parseInt(ym.slice(5, 7), 10) + '月';
    prevD = addDays(from, -1).slice(0, 7) + '-01'; nextD = toExcl;
  }
  const daysN = Math.max(1, Math.round((new Date(toExcl + 'T00:00:00+09:00') - new Date(from + 'T00:00:00+09:00')) / 86400000));

  const [resQ, checks, karteQ] = await Promise.all([
    fetchRange(from, toExcl),
    fetchChecks(from, toExcl),
    sb.from('crm_karte_notes').select('merchant_id, customer_id, author_name, created_at')
      .gte('created_at', from + 'T00:00:00+09:00').lt('created_at', toExcl + 'T00:00:00+09:00').limit(2000),
  ]);
  if (resQ.error) { app.innerHTML = '<div class="empty">読み込みエラー: ' + esc(resQ.error.message) + '</div>'; return; }
  const rows = resQ.data || [];

  // 「顧客×日」でその日にカルテが書かれたかを判定できるようにする
  const karteSet = {};
  const karteBy = {};
  (karteQ.data || []).forEach(function(n) {
    const nm = n.author_name || '（無記名）';
    karteBy[nm] = (karteBy[nm] || 0) + 1;
    const kd = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(n.created_at));
    karteSet[n.merchant_id + '|' + n.customer_id + '|' + kd] = true;
  });

  const agg = {};
  rows.forEach(function(r) {
    const st = resStaffs(r)[0];
    const a = (agg[st] = agg[st] || { count: 0, done: 0, mins: 0, rev: 0, kd: 0 });
    a.count++;
    if (checks[r.reservation_id]) a.done++;
    const rd = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
    if (karteSet[r.merchant_id + '|' + r.customer_id + '|' + rd]) a.kd++;
    a.mins += durMins(r);
    a.rev += Number(r.price) || 0;
  });

  const cap = daysN * 720; // 9:00〜21:00 = 12h/日 基準
  function hrs(m) { return (Math.round(m / 6) / 10) + 'h'; }

  let html = '<div class="tabs">'
    + '<a class="' + (range === 'day' ? 'on' : '') + '" href="#/report?range=day&date=' + date + '">日</a>'
    + '<a class="' + (range === 'week' ? 'on' : '') + '" href="#/report?range=week&date=' + date + '">週</a>'
    + '<a class="' + (range === 'month' ? 'on' : '') + '" href="#/report?range=month&date=' + date + '">月</a>'
    + '</div>';
  html += '<div class="selbar">'
    + '<button id="rpPrev">←</button>'
    + '<span style="font-weight:700;font-size:15px">' + label + '</span>'
    + '<button id="rpNext">→</button>'
    + '<span style="color:var(--sub)">全' + rows.length + '件</span>'
    + '</div>';

  if (!rows.length) {
    html += '<div class="empty">この期間の予約はありません</div>';
  } else {
    let tc = 0, td = 0, tm = 0, tr = 0, tk = 0;
    html += '<div class="tlwrap" style="padding:0"><table class="rep"><thead><tr>'
      + '<th>スタッフ</th><th>件数</th><th>✓済み</th><th>📝カルテ</th><th>記入率</th><th>稼働</th><th>埋まり率</th><th>売上</th></tr></thead><tbody>';
    Object.keys(agg).sort().forEach(function(st) {
      const a = agg[st];
      tc += a.count; td += a.done; tm += a.mins; tr += a.rev; tk += a.kd;
      const rate = Math.round(a.mins / cap * 100);
      const krate = a.count ? Math.round(a.kd / a.count * 100) : 0;
      const kcolor = krate >= 100 ? 'var(--accent)' : (krate >= 80 ? '#b0743a' : '#b3261e');
      html += '<tr><td>' + esc(st) + '</td><td>' + a.count + '</td>'
        + '<td>' + a.done + '/' + a.count + '</td>'
        + '<td>' + a.kd + '/' + a.count + (krate >= 100 ? ' ✅' : '') + '</td>'
        + '<td style="color:' + kcolor + ';font-weight:700">' + krate + '%<div class="bar"><span style="width:' + Math.min(krate, 100) + '%;background:' + kcolor + '"></span></div></td>'
        + '<td>' + hrs(a.mins) + '</td>'
        + '<td>' + rate + '%<div class="bar"><span style="width:' + Math.min(rate, 100) + '%"></span></div></td>'
        + '<td>' + a.rev.toLocaleString('ja-JP') + '円</td></tr>';
    });
    const tkrate = tc ? Math.round(tk / tc * 100) : 0;
    html += '<tr class="tot"><td>合計</td><td>' + tc + '</td><td>' + td + '/' + tc + '</td>'
      + '<td>' + tk + '/' + tc + '</td><td>' + tkrate + '%</td>'
      + '<td>' + hrs(tm) + '</td><td>-</td><td>' + tr.toLocaleString('ja-JP') + '円</td></tr>';
    html += '</tbody></table></div>';
    html += '<div style="color:var(--sub);font-size:11px;margin:6px 2px">※📝カルテ＝担当したお客様のうち当日カルテを書けた件数（記入率は査定の参考指標。月表示にすると月次の集計になります）。埋まり率は営業12h×' + daysN + '日基準。売上はレッスン料ベース（月謝・回数券払いは0円計上）</div>';
  }

  html += '<div class="card" style="margin-top:12px"><h2>📝 カルテ記入</h2>';
  const kNames = Object.keys(karteBy);
  if (!kNames.length) {
    html += '<div class="empty" style="padding:10px 0">この期間のカルテ記入はまだありません</div>';
  } else {
    kNames.sort().forEach(function(nm) {
      html += '<div class="hist"><span style="flex:1">' + esc(nm) + '</span><span>' + karteBy[nm] + '件</span></div>';
    });
  }
  html += '</div>';

  // フォロー対象（期間に関係なく現時点の全顧客から自動抽出 = LTV対策リスト）
  const [statsAll, custAll] = await Promise.all([
    sb.from('crm_customer_stats').select('*').limit(2000),
    sb.from('crm_customers').select('merchant_id,customer_id,name,ticket_books').limit(2000),
  ]);
  const nameOf = {};
  (custAll.data || []).forEach(function(cu) { nameOf[custKey(cu.merchant_id, cu.customer_id)] = cu.name || ''; });

  const riskList = [];
  (statsAll.data || []).forEach(function(st) {
    if (st.next_visit || !st.last_visit) return;
    const gap = daysBetween(st.last_visit, Date.now());
    const threshold = Math.max(21, (st.avg_interval_days || 14) * 1.5);
    if (gap > threshold && gap <= 90 && st.past_visits >= 1) {
      riskList.push({ st: st, gap: gap, mild: (st.past_visits || 0) >= 15 });
    }
  });
  // 🔴（新しめのお客様）を先に、🟡（長期のお客様＝ゆるやか対応）を後に
  riskList.sort(function(a, b) { return (a.mild ? 1 : 0) - (b.mild ? 1 : 0) || a.gap - b.gap; });

  const ticketList = [];
  (custAll.data || []).forEach(function(cu) {
    const al = ticketAlerts(cu.ticket_books);
    if (al.length) ticketList.push({ cu: cu, text: al[0].text });
  });

  html += '<div class="card" style="margin-top:12px"><h2>🔴 フォロー対象（自動抽出・現時点）</h2>';
  html += '<h3>離脱注意（次回予約なし・来店ペース超過）　<small style="color:var(--sub);font-weight:400">🔴=優先フォロー／🟡=長期のお客様（15回以上）はゆるやかに様子見</small></h3>';
  if (!riskList.length) html += '<div class="empty" style="padding:8px 0">現在該当なし 🎉</div>';
  riskList.slice(0, 15).forEach(function(x) {
    const k = custKey(x.st.merchant_id, x.st.customer_id);
    html += '<div class="hist"><span>' + (x.mild ? '🟡' : '🔴') + '</span>'
      + '<a style="flex:1;color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.st.merchant_id) + '/' + x.st.customer_id + '">' + esc(nameOf[k] || '（名前不明）') + '</a>'
      + '<span>前回から' + x.gap + '日</span><span style="color:var(--sub)">来店' + x.st.past_visits + '回</span></div>';
  });
  if (riskList.length > 15) html += '<div style="color:var(--sub);font-size:12px">…ほか' + (riskList.length - 15) + '名</div>';

  html += '<h3>回数券の案内どき（残りわずか・期限間近）</h3>';
  if (!ticketList.length) html += '<div class="empty" style="padding:8px 0">現在該当なし</div>';
  ticketList.slice(0, 15).forEach(function(x) {
    html += '<div class="hist"><a style="flex:1;color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.cu.merchant_id) + '/' + x.cu.customer_id + '">' + esc(x.cu.name || '') + '</a>'
      + '<span>' + esc(x.text) + '</span></div>';
  });
  html += '</div>';

  app.innerHTML = html;
  document.getElementById('rpPrev').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + prevD; };
  document.getElementById('rpNext').onclick = function() { location.hash = '#/report?range=' + range + '&date=' + nextD; };
}

// ── 月謝管理（月N回コースの予約消化チェック） ─────────
function subQuota(subs) {
  // 有効な月謝から「月N回」の合計を読み取る（全角数字対応）
  let n = 0;
  (subs || []).forEach(function(s) {
    if (s.contract_status !== 'active') return;
    const normalized = String(s.product_name || '').replace(/[０-９]/g, function(c) {
      return String.fromCharCode(c.charCodeAt(0) - 65248);
    });
    const m = normalized.match(/(\d+)\s*回/);
    if (m) n += parseInt(m[1], 10);
  });
  return n;
}
function subMonthStatus(booked, N, daysLeft) {
  if (booked >= N) return { s: 0, icon: '🟢', text: '全' + N + '回予約済み' };
  if (booked === 0) return { s: 3, icon: '🔴', text: '予約ゼロ（月' + N + '回）' };
  const need = N - booked;
  const weeksLeft = daysLeft / 7;
  if (need > weeksLeft * 2) return { s: 3, icon: '🔴', text: 'あと' + need + '回・消化困難' };
  if (need > weeksLeft) return { s: 2, icon: '🟡', text: 'あと' + need + '回・要促し' };
  return { s: 1, icon: '🟠', text: 'あと' + need + '回未予約' };
}
function subNextStatus(booked, N, day) {
  if (day < 10) return { s: 0, icon: '⏳', text: '10日開放後に判定' };
  if (booked >= N) return { s: 0, icon: '🟢', text: '全' + N + '回予約済み' };
  if (booked === 0) return { s: 3, icon: '🔴', text: '予約ゼロ' };
  return { s: 2, icon: '🟡', text: 'あと' + (N - booked) + '回未予約' };
}
async function renderSubs(params) {
  const storeSel = (params && params.get('store')) || '';
  app.innerHTML = '<div class="empty">読み込み中…</div>';
  const today = jstToday();
  const ym = today.slice(0, 7);
  const y = parseInt(ym.slice(0, 5), 10), mo = parseInt(ym.slice(5, 7), 10);
  const dim = new Date(y, mo, 0).getDate();
  const day = parseInt(today.slice(8, 10), 10);
  const first = ym + '-01';
  const nextFirst = addDays(ym + '-' + String(dim).padStart(2, '0'), 1);
  const nextYm = nextFirst.slice(0, 7);
  const ny = parseInt(nextYm.slice(0, 5), 10), nmo = parseInt(nextYm.slice(5, 7), 10);
  const nextDim = new Date(ny, nmo, 0).getDate();
  const afterNextFirst = addDays(nextYm + '-' + String(nextDim).padStart(2, '0'), 1);
  const nowIso = new Date().toISOString();

  const [custQ, resQ] = await Promise.all([
    sb.from('crm_customers').select('merchant_id,customer_id,name,merchant_name,subscriptions').limit(2000),
    fetchRange(first, afterNextFirst),
  ]);
  if (custQ.error || resQ.error) { app.innerHTML = '<div class="empty">読み込みエラー</div>'; return; }

  // 顧客ごとに当月・翌月の予約数と当月消化数を数える
  const cnt = {};
  (resQ.data || []).forEach(function(r) {
    if (!r.customer_id) return;
    const k = custKey(r.merchant_id, r.customer_id);
    const d = new Intl.DateTimeFormat('sv-SE', { timeZone: TZ }).format(new Date(r.booking_start));
    const c = (cnt[k] = cnt[k] || { thisB: 0, thisV: 0, nextB: 0 });
    if (d.slice(0, 7) === ym) {
      c.thisB++;
      if (r.booking_start < nowIso) c.thisV++;
    } else if (d.slice(0, 7) === nextYm) {
      c.nextB++;
    }
  });

  const list = [];
  const storeSet = {};
  (custQ.data || []).forEach(function(cu) {
    const N = subQuota(cu.subscriptions);
    if (!N) return;
    const stTag = ((cu.merchant_name || '').split(/[\s　]/).pop()) || '店舗不明';
    storeSet[stTag] = true;
    if (storeSel && stTag !== storeSel) return;
    const k = custKey(cu.merchant_id, cu.customer_id);
    const c = cnt[k] || { thisB: 0, thisV: 0, nextB: 0 };
    const stThis = subMonthStatus(c.thisB, N, dim - day + 1);
    // 週2ペースが必要なコース（月6回以上）は消化の遅れも警告
    if (N >= 6) {
      const expected = Math.round(N * day / dim);
      if (c.thisV < expected - 1) {
        stThis.text += '・消化' + c.thisV + '回（目安' + expected + '回）';
        if (stThis.s < 2) { stThis.s = 2; stThis.icon = '🟡'; }
      }
    }
    const stNext = subNextStatus(c.nextB, N, day);
    list.push({ cu: cu, N: N, c: c, stThis: stThis, stNext: stNext, sev: Math.max(stThis.s, stNext.s), stTag: stTag });
  });
  // 店舗ごとにまとめて表示（各店舗でのチェック運用に対応）→ 店舗内は要対応順
  list.sort(function(a, b) {
    return a.stTag.localeCompare(b.stTag) || b.sev - a.sev || b.stThis.s - a.stThis.s || (a.cu.name || '').localeCompare(b.cu.name || '');
  });

  const nRed = list.filter(function(x) { return x.sev >= 3; }).length;
  const nYel = list.filter(function(x) { return x.sev === 2 || x.sev === 1; }).length;
  const nGrn = list.filter(function(x) { return x.sev === 0; }).length;

  let html = '<h2>月謝コースの予約消化（' + mo + '月・会員' + list.length + '名' + (storeSel ? '・' + esc(storeSel) : '') + '）</h2>';
  // 店舗フィルタ
  html += '<div class="chips"><a class="' + (storeSel ? '' : 'on') + '" href="#/subs">全店</a>';
  Object.keys(storeSet).sort().forEach(function(stTag) {
    html += '<a class="' + (storeSel === stTag ? 'on' : '') + '" href="#/subs?store=' + encodeURIComponent(stTag) + '">' + esc(stTag) + '</a>';
  });
  html += '</div>';
  html += '<div class="chips">'
    + '<a style="pointer-events:none;background:#b3261e;border-color:#b3261e;color:#fff">🔴 要対応 ' + nRed + '名</a>'
    + '<a style="pointer-events:none">🟡🟠 注意 ' + nYel + '名</a>'
    + '<a style="pointer-events:none">🟢 OK ' + nGrn + '名</a>'
    + '</div>';
  html += '<div style="color:var(--sub);font-size:12px;margin-bottom:8px">当月＝今月中の予約状況（消化済み含む）／翌月＝毎月10日の予約開放後にチェック。15日頃の確認がおすすめです</div>';

  html += '<div class="tlwrap" style="padding:0"><table class="rep"><thead><tr>'
    + '<th>お客様</th><th>コース</th><th>当月（消化/予約/枠）</th><th>翌月' + nmo + '月（予約/枠）</th></tr></thead><tbody>';
  let curStore = '';
  list.forEach(function(x) {
    if (x.stTag !== curStore) {
      curStore = x.stTag;
      const inStore = list.filter(function(y) { return y.stTag === curStore; });
      const r = inStore.filter(function(y) { return y.sev >= 3; }).length;
      const yl = inStore.filter(function(y) { return y.sev === 2 || y.sev === 1; }).length;
      const g = inStore.filter(function(y) { return y.sev === 0; }).length;
      html += '<tr><td colspan="4" style="text-align:left;background:#d8e2dc;font-weight:800;font-size:13.5px">'
        + '🏬 ' + esc(curStore) + '　会員' + inStore.length + '名（🔴' + r + '・🟡' + yl + '・🟢' + g + '）</td></tr>';
    }
    html += '<tr>'
      + '<td><a style="color:var(--accent);text-decoration:none" href="#/c/' + encodeURIComponent(x.cu.merchant_id) + '/' + x.cu.customer_id + '">' + esc(x.cu.name || '') + '</a></td>'
      + '<td>月' + x.N + '回</td>'
      + '<td style="text-align:left">' + x.stThis.icon + ' ' + x.c.thisV + '/' + x.c.thisB + '/' + x.N + '　' + esc(x.stThis.text) + '</td>'
      + '<td style="text-align:left">' + x.stNext.icon + ' ' + x.c.nextB + '/' + x.N + '　' + esc(x.stNext.text) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  app.innerHTML = html;
}

// ── ルーター ──────────────────────────────
async function render() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { renderLogin(); return; }
  topbar.hidden = false;

  const hash = location.hash || '#/';
  // 選択中のメニューを強調（顧客ページは「予約」扱い）
  Array.prototype.forEach.call(topbar.querySelectorAll('a'), function(a) {
    const href = a.getAttribute('href');
    let on;
    if (href === '#/') {
      on = hash === '#/' || hash.indexOf('#/?') === 0 || hash.indexOf('#/c/') === 0;
    } else {
      on = hash.indexOf(href) === 0;
    }
    a.classList.toggle('on', on);
  });
  const m = hash.match(/^#\/c\/([^/]+)\/(\d+)/);
  if (m) { renderCustomer(decodeURIComponent(m[1]), m[2]); return; }
  if (hash.indexOf('#/tl') === 0) {
    renderTimeline(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/report') === 0) {
    renderReport(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/subs') === 0) {
    renderSubs(new URLSearchParams(hash.split('?')[1] || ''));
    return;
  }
  if (hash.indexOf('#/search') === 0) {
    const q = new URLSearchParams(hash.split('?')[1] || '').get('q') || '';
    renderSearch(q); return;
  }
  const dateQ = new URLSearchParams(hash.split('?')[1] || '').get('date') || '';
  renderDay(dateQ);
}
window.addEventListener('hashchange', render);
render();
